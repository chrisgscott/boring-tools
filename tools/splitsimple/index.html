const COLORS = ['#3b82f6','#ef4444','#10b981','#f59e0b','#8b5cf6','#ec4899','#14b8a6','#f97316','#6366f1','#84cc16'];

function formatCurrency(amount) {
  return '$' + Math.abs(amount).toFixed(2);
}

// Calculate who owes whom using minimum transactions algorithm
function calculateSettlements(members, expenses) {
  const balances = {};
  members.forEach(m => balances[m.id] = 0);

  expenses.forEach(exp => {
    const payer = exp.paidBy;
    const splits = exp.splits || {};
    const totalSplit = Object.values(splits).reduce((s, v) => s + v, 0);
    if (totalSplit === 0) return;

    // Payer paid the full amount
    balances[payer] = (balances[payer] || 0) + exp.amount;

    // Each person owes their share
    Object.entries(splits).forEach(([memberId, share]) => {
      balances[memberId] = (balances[memberId] || 0) - share;
    });
  });

  // Simplify: minimum transactions
  const debtors = []; // negative balance = owes money
  const creditors = []; // positive balance = is owed money

  Object.entries(balances).forEach(([id, balance]) => {
    const rounded = Math.round(balance * 100) / 100;
    if (rounded < -0.005) debtors.push({ id, amount: -rounded });
    else if (rounded > 0.005) creditors.push({ id, amount: rounded });
  });

  debtors.sort((a, b) => b.amount - a.amount);
  creditors.sort((a, b) => b.amount - a.amount);

  const settlements = [];
  let di = 0, ci = 0;
  while (di < debtors.length && ci < creditors.length) {
    const transfer = Math.min(debtors[di].amount, creditors[ci].amount);
    if (transfer > 0.005) {
      settlements.push({
        from: debtors[di].id,
        to: creditors[ci].id,
        amount: Math.round(transfer * 100) / 100
      });
    }
    debtors[di].amount -= transfer;
    creditors[ci].amount -= transfer;
    if (debtors[di].amount < 0.01) di++;
    if (creditors[ci].amount < 0.01) ci++;
  }

  return { balances, settlements };
}

function AddExpenseModal({ members, onClose, onSave }) {
  const [description, setDescription] = useState('');
  const [amount, setAmount] = useState('');
  const [paidBy, setPaidBy] = useState(members[0]?.id || '');
  const [splitType, setSplitType] = useState('equal'); // equal, custom, percentage
  const [customSplits, setCustomSplits] = useState({});
  const [selectedMembers, setSelectedMembers] = useState(new Set(members.map(m => m.id)));

  const toggleMember = (id) => {
    const next = new Set(selectedMembers);
    if (next.has(id)) next.delete(id); else next.add(id);
    setSelectedMembers(next);
  };

  const computeSplits = () => {
    const amt = parseFloat(amount) || 0;
    if (amt <= 0) return {};

    if (splitType === 'equal') {
      const selected = members.filter(m => selectedMembers.has(m.id));
      if (selected.length === 0) return {};
      const share = Math.round((amt / selected.length) * 100) / 100;
      // Handle rounding: give the difference to the first person
      const splits = {};
      let remaining = amt;
      selected.forEach((m, i) => {
        if (i === selected.length - 1) {
          splits[m.id] = Math.round(remaining * 100) / 100;
        } else {
          splits[m.id] = share;
          remaining -= share;
        }
      });
      return splits;
    }

    if (splitType === 'custom') {
      const splits = {};
      members.forEach(m => {
        const val = parseFloat(customSplits[m.id]) || 0;
        if (val > 0) splits[m.id] = val;
      });
      return splits;
    }

    if (splitType === 'percentage') {
      const splits = {};
      let remaining = amt;
      const entries = members.map(m => [m.id, parseFloat(customSplits[m.id]) || 0]).filter(([, v]) => v > 0);
      entries.forEach(([id, pct], i) => {
        if (i === entries.length - 1) {
          splits[id] = Math.round(remaining * 100) / 100;
        } else {
          const val = Math.round((amt * pct / 100) * 100) / 100;
          splits[id] = val;
          remaining -= val;
        }
      });
      return splits;
    }

    return {};
  };

  const splits = computeSplits();
  const splitTotal = Object.values(splits).reduce((s, v) => s + v, 0);
  const amt = parseFloat(amount) || 0;
  const isBalanced = Math.abs(splitTotal - amt) < 0.02;

  const handleSave = () => {
    if (!description.trim() || amt <= 0 || !paidBy) return;
    onSave({
      description: description.trim(),
      amount: amt,
      paidBy,
      splits: computeSplits(),
      date: new Date().toISOString().split('T')[0]
    });
  };

  return (
    <div className="fixed inset-0 bg-black/40 flex items-end sm:items-center justify-center z-50" onClick={onClose}>
      <div className="bg-white dark:bg-gray-800 rounded-t-2xl sm:rounded-2xl p-6 w-full max-w-md max-h-[90vh] overflow-y-auto slide-in" onClick={e => e.stopPropagation()}>
        <h2 className="text-lg font-semibold text-gray-900 dark:text-white mb-4">Add Expense</h2>
        <div className="space-y-4">
          <div>
            <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">What for?</label>
            <input value={description} onChange={e => setDescription(e.target.value)} placeholder="Dinner, Uber, groceries..." className="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none" autoFocus />
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Amount</label>
            <div className="relative">
              <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">$</span>
              <input type="number" step="0.01" min="0" value={amount} onChange={e => setAmount(e.target.value)} placeholder="0.00" className="w-full pl-7 pr-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none" />
            </div>
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Paid by</label>
            <div className="flex gap-2 flex-wrap">
              {members.map(m => (
                <button key={m.id} onClick={() => setPaidBy(m.id)} className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-all ${paidBy === m.id ? 'bg-brand-600 text-white' : 'bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600'}`}>{m.name}</button>
              ))}
            </div>
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Split</label>
            <div className="flex gap-1 bg-gray-100 dark:bg-gray-700 rounded-lg p-1 mb-3">
              {[['equal', 'Equal'], ['custom', 'Custom $'], ['percentage', 'Percentage']].map(([key, label]) => (
                <button key={key} onClick={() => setSplitType(key)} className={`flex-1 px-2 py-1.5 rounded-md text-sm font-medium transition-all ${splitType === key ? 'bg-white dark:bg-gray-600 text-gray-900 dark:text-white shadow-sm' : 'text-gray-600 dark:text-gray-400'}`}>{label}</button>
              ))}
            </div>

            {splitType === 'equal' && (
              <div className="space-y-1">
                {members.map(m => (
                  <label key={m.id} className="flex items-center gap-2 p-2 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700/50 cursor-pointer">
                    <input type="checkbox" checked={selectedMembers.has(m.id)} onChange={() => toggleMember(m.id)} className="w-4 h-4 rounded border-gray-300 text-brand-600 focus:ring-brand-500" />
                    <span className="text-sm text-gray-700 dark:text-gray-300 flex-1">{m.name}</span>
                    {selectedMembers.has(m.id) && amt > 0 && (
                      <span className="text-sm text-gray-500 dark:text-gray-400">{formatCurrency(splits[m.id] || 0)}</span>
                    )}
                  </label>
                ))}
              </div>
            )}

            {splitType === 'custom' && (
              <div className="space-y-2">
                {members.map(m => (
                  <div key={m.id} className="flex items-center gap-2">
                    <span className="text-sm text-gray-700 dark:text-gray-300 flex-1">{m.name}</span>
                    <div className="relative w-28">
                      <span className="absolute left-2 top-1/2 -translate-y-1/2 text-gray-400 text-sm">$</span>
                      <input type="number" step="0.01" min="0" value={customSplits[m.id] || ''} onChange={e => setCustomSplits({...customSplits, [m.id]: e.target.value})} className="w-full pl-6 pr-2 py-1.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white text-sm focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none" />
                    </div>
                  </div>
                ))}
                {amt > 0 && (
                  <div className={`text-sm text-right ${isBalanced ? 'text-green-600 dark:text-green-400' : 'text-red-500'}`}>
                    Total: {formatCurrency(splitTotal)} / {formatCurrency(amt)} {isBalanced ? '✓' : '(does not match)'}
                  </div>
                )}
              </div>
            )}

            {splitType === 'percentage' && (
              <div className="space-y-2">
                {members.map(m => (
                  <div key={m.id} className="flex items-center gap-2">
                    <span className="text-sm text-gray-700 dark:text-gray-300 flex-1">{m.name}</span>
                    <div className="relative w-24">
                      <input type="number" step="1" min="0" max="100" value={customSplits[m.id] || ''} onChange={e => setCustomSplits({...customSplits, [m.id]: e.target.value})} className="w-full pr-7 pl-2 py-1.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white text-sm focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none" />
                      <span className="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 text-sm">%</span>
                    </div>
                    {amt > 0 && (customSplits[m.id] > 0) && (
                      <span className="text-xs text-gray-400 w-16 text-right">{formatCurrency(amt * (parseFloat(customSplits[m.id]) || 0) / 100)}</span>
                    )}
                  </div>
                ))}
                {amt > 0 && (() => {
                  const pctTotal = Object.values(customSplits).reduce((s, v) => s + (parseFloat(v) || 0), 0);
                  return (
                    <div className={`text-sm text-right ${Math.abs(pctTotal - 100) < 0.5 ? 'text-green-600 dark:text-green-400' : 'text-red-500'}`}>
                      Total: {pctTotal.toFixed(0)}% {Math.abs(pctTotal - 100) < 0.5 ? '✓' : '(should be 100%)'}
                    </div>
                  );
                })()}
              </div>
            )}
          </div>
        </div>
        <div className="flex gap-3 mt-6">
          <button onClick={onClose} className="flex-1 px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">Cancel</button>
          <button onClick={handleSave} disabled={!description.trim() || amt <= 0 || !paidBy || (splitType !== 'equal' && !isBalanced)} className="flex-1 px-4 py-2 rounded-lg bg-brand-600 text-white hover:bg-brand-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">Add</button>
        </div>
      </div>
    </div>
  );
}

function MemberAvatar({ name, size = 'md' }) {
  const initial = name.charAt(0).toUpperCase();
  const hash = name.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
  const color = COLORS[hash % COLORS.length];
  const sizeClass = size === 'sm' ? 'w-7 h-7 text-xs' : 'w-9 h-9 text-sm';
  return (
    <div className={`${sizeClass} rounded-full flex items-center justify-center text-white font-semibold`} style={{ backgroundColor: color }} title={name}>
      {initial}
    </div>
  );
}

function GroupView({ group, data, setData, onBack }) {
  const [showAddMember, setShowAddMember] = useState(false);
  const [showAddExpense, setShowAddExpense] = useState(false);
  const [tab, setTab] = useState('expenses'); // expenses, settle

  const members = group.members || [];
  const expenses = group.expenses || [];

  const updateGroup = (updates) => {
    const newGroups = data.groups.map(g => g.id === group.id ? { ...g, ...updates } : g);
    const newData = { ...data, groups: newGroups };
    setData(newData);
    saveData(newData);
  };

  const addMember = (name) => {
    const member = { id: generateId(), name };
    updateGroup({ members: [...members, member] });
    setShowAddMember(false);
  };

  const removeMember = (memberId) => {
    const hasExpenses = expenses.some(e => e.paidBy === memberId || (e.splits && e.splits[memberId]));
    if (hasExpenses) {
      if (!confirm(`${members.find(m => m.id === memberId)?.name} has expenses. Remove anyway?`)) return;
    }
    updateGroup({
      members: members.filter(m => m.id !== memberId),
      expenses: expenses.map(e => {
        const newSplits = { ...e.splits };
        delete newSplits[memberId];
        return { ...e, splits: newSplits, paidBy: e.paidBy === memberId ? members[0]?.id : e.paidBy };
      })
    });
  };

  const addExpense = (expense) => {
    updateGroup({ expenses: [{ ...expense, id: generateId() }, ...expenses] });
    setShowAddExpense(false);
  };

  const removeExpense = (expenseId) => {
    updateGroup({ expenses: expenses.filter(e => e.id !== expenseId) });
  };

  const { balances, settlements } = useMemo(() => calculateSettlements(members, expenses), [members, expenses]);
  const total = expenses.reduce((s, e) => s + e.amount, 0);

  const getMemberName = (id) => members.find(m => m.id === id)?.name || 'Unknown';

  const exportSettlements = () => {
    let text = `SplitSimple - ${group.name}\n`;
    text += `${'='.repeat(40)}\n\n`;
    text += `Total expenses: ${formatCurrency(total)}\n`;
    text += `${expenses.length} expenses, ${members.length} people\n\n`;

    text += `Balances:\n`;
    members.forEach(m => {
      const b = balances[m.id] || 0;
      const rounded = Math.round(b * 100) / 100;
      if (rounded > 0) text += `  ${m.name}: is owed ${formatCurrency(rounded)}\n`;
      else if (rounded < 0) text += `  ${m.name}: owes ${formatCurrency(-rounded)}\n`;
      else text += `  ${m.name}: settled up\n`;
    });

    if (settlements.length > 0) {
      text += `\nSettlements (${settlements.length} payment${settlements.length > 1 ? 's' : ''}):\n`;
      settlements.forEach(s => {
        text += `  ${getMemberName(s.from)} pays ${getMemberName(s.to)}: ${formatCurrency(s.amount)}\n`;
      });
    } else {
      text += `\nEveryone is settled up!\n`;
    }

    text += `\nExpenses:\n`;
    expenses.forEach(e => {
      text += `  ${e.date} - ${e.description}: ${formatCurrency(e.amount)} (paid by ${getMemberName(e.paidBy)})\n`;
    });

    const blob = new Blob([text], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `splitsimple-${group.name.toLowerCase().replace(/\s+/g, '-')}.txt`;
    a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div className="max-w-lg mx-auto">
      {/* Header */}
      <div className="flex items-center gap-3 mb-6">
        <button onClick={onBack} className="p-2 -ml-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
          <svg className="w-5 h-5 text-gray-600 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>
        </button>
        <div className="flex items-center gap-2">
          <span className="text-xl">{group.emoji}</span>
          <h1 className="text-xl font-bold text-gray-900 dark:text-white">{group.name}</h1>
        </div>
      </div>

      {/* Members */}
      <div className="mb-4">
        <div className="flex items-center justify-between mb-2">
          <h2 className="text-sm font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wide">People</h2>
          <button onClick={() => setShowAddMember(true)} className="text-sm text-brand-600 dark:text-brand-400 hover:text-brand-700 dark:hover:text-brand-300 font-medium">+ Add</button>
        </div>
        {members.length === 0 ? (
          <p className="text-sm text-gray-400 dark:text-gray-500 py-3">Add people to start splitting expenses.</p>
        ) : (
          <div className="flex gap-2 flex-wrap">
            {members.map(m => {
              const balance = Math.round((balances[m.id] || 0) * 100) / 100;
              return (
                <div key={m.id} className="group relative flex items-center gap-2 bg-gray-50 dark:bg-gray-700/50 rounded-lg px-3 py-2">
                  <MemberAvatar name={m.name} size="sm" />
                  <div>
                    <div className="text-sm font-medium text-gray-900 dark:text-white">{m.name}</div>
                    {expenses.length > 0 && (
                      <div className={`text-xs ${balance > 0 ? 'text-green-600 dark:text-green-400' : balance < 0 ? 'text-red-500 dark:text-red-400' : 'text-gray-400'}`}>
                        {balance > 0 ? `gets ${formatCurrency(balance)}` : balance < 0 ? `owes ${formatCurrency(-balance)}` : 'settled'}
                      </div>
                    )}
                  </div>
                  <button onClick={() => removeMember(m.id)} className="opacity-0 group-hover:opacity-100 absolute -top-1 -right-1 w-5 h-5 rounded-full bg-red-500 text-white text-xs flex items-center justify-center transition-opacity">x</button>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Tabs */}
      {members.length >= 2 && (
        <>
          <div className="flex gap-1 bg-gray-100 dark:bg-gray-700 rounded-lg p-1 mb-4">
            {[['expenses', 'Expenses'], ['settle', 'Settle Up']].map(([key, label]) => (
              <button key={key} onClick={() => setTab(key)} className={`flex-1 px-3 py-2 rounded-md text-sm font-medium transition-all ${tab === key ? 'bg-white dark:bg-gray-600 text-gray-900 dark:text-white shadow-sm' : 'text-gray-600 dark:text-gray-400'}`}>{label}</button>
            ))}
          </div>

          {tab === 'expenses' && (
            <div>
              <button onClick={() => setShowAddExpense(true)} className="w-full mb-4 px-4 py-3 rounded-xl border-2 border-dashed border-gray-300 dark:border-gray-600 text-gray-500 dark:text-gray-400 hover:border-brand-500 hover:text-brand-600 dark:hover:border-brand-400 dark:hover:text-brand-400 transition-colors font-medium">
                + Add Expense
              </button>
              {expenses.length === 0 ? (
                <p className="text-center text-gray-400 dark:text-gray-500 py-8">No expenses yet. Add one to get started.</p>
              ) : (
                <div className="space-y-2">
                  {expenses.map(exp => (
                    <div key={exp.id} className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-3 flex items-center gap-3 fade-in group">
                      <div className="flex-1 min-w-0">
                        <div className="flex items-baseline gap-2">
                          <span className="text-sm font-medium text-gray-900 dark:text-white truncate">{exp.description}</span>
                          <span className="text-xs text-gray-400 shrink-0">{exp.date}</span>
                        </div>
                        <div className="text-xs text-gray-500 dark:text-gray-400 mt-0.5">
                          Paid by <span className="font-medium">{getMemberName(exp.paidBy)}</span>
                          {' '} - split {Object.keys(exp.splits || {}).length} ways
                        </div>
                      </div>
                      <div className="text-sm font-semibold text-gray-900 dark:text-white shrink-0">{formatCurrency(exp.amount)}</div>
                      <button onClick={() => removeExpense(exp.id)} className="opacity-0 group-hover:opacity-100 p-1 rounded hover:bg-red-50 dark:hover:bg-red-900/20 text-gray-400 hover:text-red-500 transition-all shrink-0">
                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                      </button>
                    </div>
                  ))}
                  <div className="text-right text-sm text-gray-500 dark:text-gray-400 pt-2 border-t border-gray-100 dark:border-gray-700">
                    Total: <span className="font-semibold text-gray-900 dark:text-white">{formatCurrency(total)}</span>
                  </div>
                </div>
              )}
            </div>
          )}

          {tab === 'settle' && (
            <div>
              {settlements.length === 0 ? (
                <div className="text-center py-8">
                  <div className="text-4xl mb-2">✅</div>
                  <p className="text-gray-600 dark:text-gray-400 font-medium">Everyone is settled up!</p>
                  {expenses.length === 0 && <p className="text-sm text-gray-400 dark:text-gray-500 mt-1">Add expenses to see who owes what.</p>}
                </div>
              ) : (
                <div className="space-y-3">
                  <p className="text-sm text-gray-500 dark:text-gray-400">{settlements.length} payment{settlements.length > 1 ? 's' : ''} to settle up:</p>
                  {settlements.map((s, i) => (
                    <div key={i} className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 flex items-center gap-3 fade-in">
                      <MemberAvatar name={getMemberName(s.from)} size="sm" />
                      <div className="flex-1">
                        <div className="text-sm">
                          <span className="font-medium text-gray-900 dark:text-white">{getMemberName(s.from)}</span>
                          <span className="text-gray-500 dark:text-gray-400"> pays </span>
                          <span className="font-medium text-gray-900 dark:text-white">{getMemberName(s.to)}</span>
                        </div>
                      </div>
                      <div className="text-lg font-bold text-brand-600 dark:text-brand-400">{formatCurrency(s.amount)}</div>
                    </div>
                  ))}
                  <button onClick={exportSettlements} className="w-full mt-4 px-4 py-2.5 rounded-xl bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors text-sm font-medium flex items-center justify-center gap-2">
                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                    Export Summary
                  </button>
                </div>
              )}

              {/* Balances breakdown */}
              {expenses.length > 0 && (
                <div className="mt-6 pt-4 border-t border-gray-200 dark:border-gray-700">
                  <h3 className="text-sm font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-3">Balances</h3>
                  <div className="space-y-2">
                    {members.map(m => {
                      const balance = Math.round((balances[m.id] || 0) * 100) / 100;
                      const maxAbs = Math.max(...members.map(m2 => Math.abs(balances[m2.id] || 0)), 1);
                      const barWidth = Math.abs(balance) / maxAbs * 100;
                      return (
                        <div key={m.id} className="flex items-center gap-2">
                          <span className="text-sm text-gray-700 dark:text-gray-300 w-20 truncate">{m.name}</span>
                          <div className="flex-1 h-5 bg-gray-100 dark:bg-gray-700 rounded relative overflow-hidden">
                            {balance !== 0 && (
                              <div
                                className={`absolute top-0 h-full rounded ${balance > 0 ? 'bg-green-400 dark:bg-green-500 left-1/2' : 'bg-red-400 dark:bg-red-500 right-1/2'}`}
                                style={{ width: `${barWidth / 2}%` }}
                              />
                            )}
                            <div className="absolute inset-0 flex items-center justify-center">
                              <span className={`text-xs font-medium ${balance > 0 ? 'text-green-700 dark:text-green-300' : balance < 0 ? 'text-red-700 dark:text-red-300' : 'text-gray-400'}`}>
                                {balance > 0 ? `+${formatCurrency(balance)}` : balance < 0 ? `-${formatCurrency(-balance)}` : '$0.00'}
                              </span>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          )}
        </>
      )}

      {showAddMember && <AddMemberModal onClose={() => setShowAddMember(false)} onSave={addMember} />}
      {showAddExpense && <AddExpenseModal members={members} onClose={() => setShowAddExpense(false)} onSave={addExpense} />}
    </div>
  );
}

function App() {
  const [data, setData] = useState(loadData);
  const [settings, setSettings] = useState(loadSettings);
  const [selectedGroup, setSelectedGroup] = useState(null);
  const [showAddGroup, setShowAddGroup] = useState(false);

  useEffect(() => {
    if (settings.dark) document.documentElement.classList.add('dark');
    else document.documentElement.classList.remove('dark');
  }, [settings.dark]);

  const setDark = (dark) => {
    const s = { ...settings, dark };
    setSettings(s);
    saveSettings(s);
  };

  const addGroup = ({ name, emoji, color }) => {
    const group = { id: generateId(), name, emoji, color, members: [], expenses: [], createdAt: new Date().toISOString() };
    const newData = { ...data, groups: [group, ...data.groups] };
    setData(newData);
    saveData(newData);
    setShowAddGroup(false);
    setSelectedGroup(group.id);
  };

  const deleteGroup = (id) => {
    if (!confirm('Delete this group and all its expenses?')) return;
    const newData = { ...data, groups: data.groups.filter(g => g.id !== id) };
    setData(newData);
    saveData(newData);
  };

  const exportAllData = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `splitsimple-backup-${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const importData = () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const imported = JSON.parse(ev.target.result);
          if (imported.groups && Array.isArray(imported.groups)) {
            setData(imported);
            saveData(imported);
          } else {
            alert('Invalid backup file.');
          }
        } catch { alert('Could not parse file.'); }
      };
      reader.readAsText(file);
    };
    input.click();
  };

  const activeGroup = data.groups.find(g => g.id === selectedGroup);

  if (activeGroup) {
    return (
      <div className="min-h-screen bg-gray-50 dark:bg-gray-900 transition-colors">
        <div className="px-4 py-6">
          <GroupView group={activeGroup} data={data} setData={setData} onBack={() => setSelectedGroup(null)} />
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-gray-50 dark:bg-gray-900 transition-colors">
      <div className="max-w-lg mx-auto px-4 py-6">
        {/* Header */}
        <div className="flex items-center justify-between mb-6">
          <div>
            <h1 className="text-2xl font-bold text-gray-900 dark:text-white">SplitSimple</h1>
            <p className="text-sm text-gray-500 dark:text-gray-400">Split expenses without the hassle</p>
          </div>
          <DarkModeToggle dark={settings.dark} setDark={setDark} />
        </div>

        {/* Groups */}
        {data.groups.length === 0 ? (
          <div className="text-center py-16">
            <div className="text-5xl mb-4">💰</div>
            <h2 className="text-lg font-semibold text-gray-900 dark:text-white mb-2">No groups yet</h2>
            <p className="text-gray-500 dark:text-gray-400 mb-6 max-w-xs mx-auto">Create a group for a trip, dinner, or anything you need to split.</p>
            <button onClick={() => setShowAddGroup(true)} className="px-6 py-3 rounded-xl bg-brand-600 text-white hover:bg-brand-700 transition-colors font-medium">Create First Group</button>
          </div>
        ) : (
          <>
            <div className="space-y-3 mb-6">
              {data.groups.map(g => (
                <GroupCard
                  key={g.id}
                  group={g}
                  onSelect={setSelectedGroup}
                  onDelete={deleteGroup}
                  memberCount={(g.members || []).length}
                  expenseCount={(g.expenses || []).length}
                  total={(g.expenses || []).reduce((s, e) => s + e.amount, 0)}
                />
              ))}
            </div>
            <button onClick={() => setShowAddGroup(true)} className="w-full px-4 py-3 rounded-xl border-2 border-dashed border-gray-300 dark:border-gray-600 text-gray-500 dark:text-gray-400 hover:border-brand-500 hover:text-brand-600 dark:hover:border-brand-400 dark:hover:text-brand-400 transition-colors font-medium">
              + New Group
            </button>
          </>
        )}

        {/* Footer */}
        <div className="mt-8 pt-4 border-t border-gray-200 dark:border-gray-700 flex items-center justify-between">
          <span className="text-xs text-gray-400 dark:text-gray-500">All data stays in your browser.</span>
          <div className="flex gap-3">
            <button onClick={importData} className="text-xs text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300 transition-colors">Import</button>
            <button onClick={exportAllData} className="text-xs text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300 transition-colors">Export</button>
          </div>
        </div>
      </div>

      {showAddGroup && <AddGroupModal onClose={() => setShowAddGroup(false)} onSave={addGroup} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>

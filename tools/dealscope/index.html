<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

const STORAGE_KEY = 'dealscope-data';
const SETTINGS_KEY = 'dealscope-settings';

const DEFAULT_WEIGHTS = { financials: 1.5, automation: 1.25, growth: 1.0, risk: 1.25, fit: 1.0 };

// Scoring dimensions with criteria
const DIMENSIONS = [
  {
    id: 'financials',
    name: 'Financials',
    icon: '💰',
    weight: 1.5,
    criteria: [
      { id: 'revenue_stability', label: 'Revenue stability', help: 'How consistent is MRR over 12+ months? Growing = 5, flat = 3, declining = 1. Verified via Stripe/payment processor, not screenshots.' },
      { id: 'profit_margin', label: 'Profit margins', help: 'Net margins after all costs including owner comp. 50%+ = 5, 30-50% = 3, under 30% = 1.' },
      { id: 'asking_multiple', label: 'Asking multiple', help: 'SDE multiple: under 3x = 5 (attractive), 3-5x = 4 (fair), 5-7x = 3, 7-10x = 2, 10x+ = 1. Content sites use 30-45x monthly profit.' },
      { id: 'revenue_concentration', label: 'Revenue diversification', help: 'No customer over 10% = 5. Top customer 10-20% = 3. Any customer over 20% = 1 (critical risk).' },
    ]
  },
  {
    id: 'automation',
    name: 'Automation Potential',
    icon: '🤖',
    weight: 1.25,
    criteria: [
      { id: 'owner_hours', label: 'Low owner involvement', help: 'Under 5 hrs/week = 5, 5-10 = 4, 10-20 = 3, 20-30 = 2, 30+ = 1. High hours = high founder dependency risk.' },
      { id: 'process_docs', label: 'Documented processes', help: 'Full written SOPs = 5, partial docs = 3, nothing documented = 1. No SOPs means you are buying a job, not a business.' },
      { id: 'ai_opportunity', label: 'AI/automation opportunity', help: 'Can AI tools, scripts, or workflows replace manual tasks? High potential = value creation opportunity post-acquisition.' },
      { id: 'team_dependency', label: 'Team independence', help: 'Business runs without the owner = 5. Owner handles support or dev = 2. Owner IS the brand = 1 (critical risk).' },
    ]
  },
  {
    id: 'growth',
    name: 'Growth Potential',
    icon: '📈',
    weight: 1.0,
    criteria: [
      { id: 'market_trend', label: 'Market tailwinds', help: 'Is the market growing, stable, or shrinking?' },
      { id: 'untapped_channels', label: 'Untapped channels', help: 'Are there obvious marketing channels the seller hasn\'t used?' },
      { id: 'upsell_potential', label: 'Upsell/expansion potential', help: 'Can you add tiers, features, or adjacent products?' },
      { id: 'seo_moat', label: 'SEO/content moat', help: 'Does the business have organic traffic, domain authority, or content assets?' },
    ]
  },
  {
    id: 'risk',
    name: 'Risk Profile',
    icon: '⚠️',
    weight: 1.25,
    criteria: [
      { id: 'platform_dependency', label: 'Platform independence', help: 'Multi-channel = 5. Mostly organic + some paid = 4. Single platform (Amazon, Shopify app store, one keyword) = 1-2.' },
      { id: 'tech_stack', label: 'Manageable tech stack', help: 'Current, documented stack = 5. Some outdated deps = 3. Legacy/EOL tech requiring rewrites = 1. Can you get code access before close?' },
      { id: 'competitive_moat', label: 'Competitive defensibility', help: 'Community + distribution + compliance barriers = 5. Code alone is not a moat in the AI era. No moat = 1-2x earnings.' },
      { id: 'legal_clean', label: 'Legal/regulatory clean', help: 'No issues, all contracts transferable = 5. Minor compliance work = 3. Pending disputes or non-transferable partnerships = 1.' },
    ]
  },
  {
    id: 'fit',
    name: 'Strategic Fit',
    icon: '🎯',
    weight: 1.0,
    criteria: [
      { id: 'skill_match', label: 'Skill match', help: 'Do you have (or can you hire) the skills needed to operate this?' },
      { id: 'interest_alignment', label: 'Interest alignment', help: 'Does this business operate in a space you care about or understand?' },
      { id: 'portfolio_synergy', label: 'Portfolio synergy', help: 'Does this complement your existing businesses or assets?' },
      { id: 'lifestyle_fit', label: 'Lifestyle compatibility', help: 'Does the time commitment and work style match what you want?' },
    ]
  }
];

const SCORE_LABELS = {
  1: 'Poor',
  2: 'Below Avg',
  3: 'Average',
  4: 'Good',
  5: 'Excellent'
};

const SCORE_COLORS = {
  1: 'bg-red-500',
  2: 'bg-orange-500',
  3: 'bg-yellow-500',
  4: 'bg-green-500',
  5: 'bg-emerald-500'
};

const RED_FLAGS = [
  { id: 'declining_revenue', label: 'Revenue declining >10% YoY', severity: 'critical' },
  { id: 'single_customer', label: 'Single customer >30% of revenue', severity: 'critical' },
  { id: 'pending_legal', label: 'Pending legal issues or disputes', severity: 'critical' },
  { id: 'no_financials', label: 'Seller won\'t share financials', severity: 'critical' },
  { id: 'owner_is_brand', label: 'Business is the owner\'s personal brand', severity: 'warning' },
  { id: 'outdated_tech', label: 'Tech stack is outdated or unmaintained', severity: 'warning' },
  { id: 'no_sops', label: 'No SOPs or documentation', severity: 'warning' },
  { id: 'high_churn', label: 'Monthly churn >5%', severity: 'warning' },
  { id: 'rushed_sale', label: 'Seller pushing for fast close', severity: 'warning' },
  { id: 'inconsistent_metrics', label: 'Traffic/revenue numbers don\'t match', severity: 'critical' },
  { id: 'no_code_access', label: 'Seller won\'t grant code review access', severity: 'critical' },
  { id: 'no_customer_interviews', label: 'Seller won\'t allow customer interviews', severity: 'warning' },
  { id: 'short_transition', label: 'Transition period under 30 days', severity: 'warning' },
];

function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { deals: [] }; }
  catch { return { deals: [] }; }
}
function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {};
    return { dark: false, customWeights: null, ...s };
  }
  catch { return { dark: false, customWeights: null }; }
}
function saveSettings(s) { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }

function createEmptyDeal(name) {
  const scores = {};
  DIMENSIONS.forEach(dim => {
    dim.criteria.forEach(c => { scores[c.id] = 0; });
  });
  return {
    id: generateId(),
    name: name || 'Untitled Deal',
    url: '',
    askingPrice: '',
    monthlyRevenue: '',
    monthlyProfit: '',
    notes: '',
    scores,
    redFlags: [],
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString()
  };
}

function calculateDimensionScore(deal, dimension) {
  const scored = dimension.criteria.filter(c => deal.scores[c.id] > 0);
  if (scored.length === 0) return 0;
  const sum = scored.reduce((acc, c) => acc + deal.scores[c.id], 0);
  return sum / scored.length;
}

function calculateWeightedTotal(deal, customWeights) {
  let totalWeighted = 0;
  let totalWeight = 0;
  DIMENSIONS.forEach(dim => {
    const avg = calculateDimensionScore(deal, dim);
    if (avg > 0) {
      const w = (customWeights && customWeights[dim.id] != null) ? customWeights[dim.id] : dim.weight;
      totalWeighted += avg * w;
      totalWeight += w;
    }
  });
  return totalWeight > 0 ? totalWeighted / totalWeight : 0;
}

function getVerdict(score, redFlagCount) {
  const criticalFlags = redFlagCount;
  if (criticalFlags >= 3) return { label: 'Walk Away', color: 'text-red-600 dark:text-red-400', bg: 'bg-red-100 dark:bg-red-900/30' };
  if (score >= 4.0 && criticalFlags === 0) return { label: 'Strong Buy', color: 'text-emerald-600 dark:text-emerald-400', bg: 'bg-emerald-100 dark:bg-emerald-900/30' };
  if (score >= 3.5 && criticalFlags <= 1) return { label: 'Worth Pursuing', color: 'text-green-600 dark:text-green-400', bg: 'bg-green-100 dark:bg-green-900/30' };
  if (score >= 2.5) return { label: 'Needs Work', color: 'text-yellow-600 dark:text-yellow-400', bg: 'bg-yellow-100 dark:bg-yellow-900/30' };
  if (score > 0) return { label: 'Pass', color: 'text-red-600 dark:text-red-400', bg: 'bg-red-100 dark:bg-red-900/30' };
  return { label: 'Not Scored', color: 'text-gray-500', bg: 'bg-gray-100 dark:bg-gray-800' };
}

function formatCurrency(val) {
  const n = parseFloat(val);
  if (isNaN(n)) return '-';
  return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 0 });
}

function calculateMultiple(askingPrice, monthlyProfit) {
  const price = parseFloat(askingPrice);
  const profit = parseFloat(monthlyProfit);
  if (isNaN(price) || isNaN(profit) || profit <= 0) return null;
  return (price / (profit * 12)).toFixed(1);
}

// --- Components ---

function ScoreSlider({ value, onChange, criterionId }) {
  const label = value > 0 ? SCORE_LABELS[value] : 'Not scored';
  const color = value > 0 ? SCORE_COLORS[value] : 'bg-gray-300 dark:bg-gray-600';
  return (
    <div className="flex items-center gap-3">
      <input
        type="range"
        min="0"
        max="5"
        value={value}
        onChange={e => onChange(parseInt(e.target.value))}
        className="flex-1 cursor-pointer"
      />
      <span className={`text-xs font-medium px-2 py-0.5 rounded-full text-white min-w-[72px] text-center ${color}`}>
        {value > 0 ? `${value}/5` : '-'}
      </span>
    </div>
  );
}

function DimensionCard({ dimension, deal, onScoreChange, expanded, onToggle, activeWeight }) {
  const avg = calculateDimensionScore(deal, dimension);
  const scored = dimension.criteria.filter(c => deal.scores[c.id] > 0).length;
  const total = dimension.criteria.length;
  const w = activeWeight != null ? activeWeight : dimension.weight;

  return (
    <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden fade-in">
      <button
        onClick={onToggle}
        className="w-full px-4 py-3 flex items-center justify-between hover:bg-gray-50 dark:hover:bg-gray-750 transition-colors"
      >
        <div className="flex items-center gap-3">
          <span className="text-xl">{dimension.icon}</span>
          <div className="text-left">
            <span className="font-semibold text-gray-900 dark:text-white text-sm">{dimension.name}</span>
            <span className="text-xs text-gray-500 dark:text-gray-400 ml-2">
              {scored}/{total} scored
              {w !== 1.0 ? ` (${w}x weight)` : ''}
            </span>
          </div>
        </div>
        <div className="flex items-center gap-3">
          {avg > 0 && (
            <span className={`text-sm font-bold ${avg >= 4 ? 'text-emerald-600 dark:text-emerald-400' : avg >= 3 ? 'text-yellow-600 dark:text-yellow-400' : 'text-red-600 dark:text-red-400'}`}>
              {avg.toFixed(1)}/5
            </span>
          )}
          <svg className={`w-5 h-5 text-gray-400 transition-transform ${expanded ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
          </svg>
        </div>
      </button>
      {expanded && (
        <div className="px-4 pb-4 space-y-4 border-t border-gray-100 dark:border-gray-700 pt-3 slide-in">
          {dimension.criteria.map(criterion => (
            <div key={criterion.id}>
              <div className="flex items-start justify-between mb-1">
                <label className="text-sm text-gray-700 dark:text-gray-300 font-medium">{criterion.label}</label>
                <span className="text-xs text-gray-400 dark:text-gray-500">{SCORE_LABELS[deal.scores[criterion.id]] || 'Not scored'}</span>
              </div>
              <p className="text-xs text-gray-500 dark:text-gray-400 mb-2">{criterion.help}</p>
              <ScoreSlider
                value={deal.scores[criterion.id]}
                onChange={val => onScoreChange(criterion.id, val)}
                criterionId={criterion.id}
              />
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function RedFlagChecklist({ deal, onToggleFlag }) {
  const criticalCount = deal.redFlags.filter(id => RED_FLAGS.find(f => f.id === id)?.severity === 'critical').length;
  const warningCount = deal.redFlags.filter(id => RED_FLAGS.find(f => f.id === id)?.severity === 'warning').length;

  return (
    <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4">
      <h3 className="font-semibold text-gray-900 dark:text-white text-sm mb-3 flex items-center gap-2">
        🚩 Red Flags
        {deal.redFlags.length > 0 && (
          <span className="text-xs px-2 py-0.5 rounded-full bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400">
            {deal.redFlags.length} flagged
          </span>
        )}
      </h3>
      <div className="space-y-2">
        {RED_FLAGS.map(flag => (
          <label key={flag.id} className="flex items-start gap-2 cursor-pointer group">
            <input
              type="checkbox"
              checked={deal.redFlags.includes(flag.id)}
              onChange={() => onToggleFlag(flag.id)}
              className="mt-0.5 rounded border-gray-300 text-red-600 focus:ring-red-500"
            />
            <span className={`text-sm ${deal.redFlags.includes(flag.id) ? 'text-red-600 dark:text-red-400 font-medium' : 'text-gray-600 dark:text-gray-400 group-hover:text-gray-900 dark:group-hover:text-gray-200'}`}>
              {flag.label}
              {flag.severity === 'critical' && (
                <span className="ml-1 text-xs text-red-500 font-medium">(critical)</span>
              )}
            </span>
          </label>
        ))}
      </div>
    </div>
  );
}

function ScoreBar({ score, maxScore = 5 }) {
  const pct = (score / maxScore) * 100;
  const color = score >= 4 ? 'bg-emerald-500' : score >= 3 ? 'bg-yellow-500' : score >= 2 ? 'bg-orange-500' : 'bg-red-500';
  return (
    <div className="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2">
      <div className={`h-2 rounded-full transition-all duration-500 ${color}`} style={{ width: `${pct}%` }} />
    </div>
  );
}

function DealCard({ deal, onSelect, isSelected, customWeights }) {
  const score = calculateWeightedTotal(deal, customWeights);
  const verdict = getVerdict(score, deal.redFlags.length);
  const multiple = calculateMultiple(deal.askingPrice, deal.monthlyProfit);

  return (
    <button
      onClick={() => onSelect(deal.id)}
      className={`w-full text-left p-4 rounded-xl border transition-all ${
        isSelected
          ? 'border-brand-500 bg-brand-50 dark:bg-brand-900/20 ring-2 ring-brand-500/20'
          : 'border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 hover:border-gray-300 dark:hover:border-gray-600'
      }`}
    >
      <div className="flex items-start justify-between mb-2">
        <h3 className="font-semibold text-gray-900 dark:text-white text-sm truncate pr-2">{deal.name}</h3>
        <span className={`text-xs font-bold px-2 py-0.5 rounded-full whitespace-nowrap ${verdict.bg} ${verdict.color}`}>
          {verdict.label}
        </span>
      </div>
      <div className="flex items-center gap-4 text-xs text-gray-500 dark:text-gray-400 mb-2">
        {deal.askingPrice && <span>Ask: {formatCurrency(deal.askingPrice)}</span>}
        {multiple && <span>{multiple}x multiple</span>}
        {deal.redFlags.length > 0 && <span className="text-red-500">🚩 {deal.redFlags.length}</span>}
      </div>
      {score > 0 && (
        <div className="flex items-center gap-2">
          <ScoreBar score={score} />
          <span className="text-xs font-bold text-gray-600 dark:text-gray-300 min-w-[32px]">{score.toFixed(1)}</span>
        </div>
      )}
    </button>
  );
}

function CompareView({ deals, customWeights }) {
  const scoredDeals = deals.filter(d => calculateWeightedTotal(d, customWeights) > 0);
  if (scoredDeals.length < 2) {
    return (
      <div className="text-center py-12 text-gray-500 dark:text-gray-400">
        <p className="text-lg mb-2">Score at least 2 deals to compare them</p>
        <p className="text-sm">Go back to the deal list and score your opportunities</p>
      </div>
    );
  }

  const sorted = [...scoredDeals].sort((a, b) => calculateWeightedTotal(b, customWeights) - calculateWeightedTotal(a, customWeights));

  return (
    <div className="space-y-6 fade-in">
      <h2 className="text-lg font-bold text-gray-900 dark:text-white">Deal Comparison</h2>

      {/* Ranking */}
      <div className="space-y-3">
        {sorted.map((deal, i) => {
          const score = calculateWeightedTotal(deal, customWeights);
          const verdict = getVerdict(score, deal.redFlags.length);
          const multiple = calculateMultiple(deal.askingPrice, deal.monthlyProfit);
          return (
            <div key={deal.id} className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4">
              <div className="flex items-center gap-3 mb-3">
                <span className={`text-lg font-bold ${i === 0 ? 'text-brand-600' : 'text-gray-400'}`}>#{i + 1}</span>
                <div className="flex-1">
                  <h3 className="font-semibold text-gray-900 dark:text-white text-sm">{deal.name}</h3>
                  <div className="flex gap-3 text-xs text-gray-500 dark:text-gray-400">
                    {deal.askingPrice && <span>{formatCurrency(deal.askingPrice)}</span>}
                    {multiple && <span>{multiple}x</span>}
                  </div>
                </div>
                <div className="text-right">
                  <div className="text-lg font-bold text-gray-900 dark:text-white">{score.toFixed(1)}</div>
                  <span className={`text-xs font-medium ${verdict.color}`}>{verdict.label}</span>
                </div>
              </div>

              {/* Dimension breakdown */}
              <div className="grid grid-cols-5 gap-2">
                {DIMENSIONS.map(dim => {
                  const dimScore = calculateDimensionScore(deal, dim);
                  const w = (customWeights && customWeights[dim.id] != null) ? customWeights[dim.id] : dim.weight;
                  return (
                    <div key={dim.id} className="text-center">
                      <div className="text-xs text-gray-500 dark:text-gray-400 mb-1">{dim.icon}{w !== dim.weight ? <span className="text-brand-500 ml-0.5">{w}x</span> : ''}</div>
                      <div className={`text-sm font-bold ${dimScore >= 4 ? 'text-emerald-600 dark:text-emerald-400' : dimScore >= 3 ? 'text-yellow-600 dark:text-yellow-400' : dimScore > 0 ? 'text-red-600 dark:text-red-400' : 'text-gray-300 dark:text-gray-600'}`}>
                        {dimScore > 0 ? dimScore.toFixed(1) : '-'}
                      </div>
                    </div>
                  );
                })}
              </div>

              {deal.redFlags.length > 0 && (
                <div className="mt-2 pt-2 border-t border-gray-100 dark:border-gray-700">
                  <span className="text-xs text-red-500">
                    🚩 {deal.redFlags.map(id => RED_FLAGS.find(f => f.id === id)?.label).filter(Boolean).join(', ')}
                  </span>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function WeightSlider({ dimension, value, onChange }) {
  const labels = { 0.5: '0.5x', 0.75: '0.75x', 1.0: '1.0x', 1.25: '1.25x', 1.5: '1.5x', 1.75: '1.75x', 2.0: '2.0x' };
  return (
    <div className="flex items-center gap-3">
      <div className="flex items-center gap-2 min-w-[120px]">
        <span className="text-base">{dimension.icon}</span>
        <span className="text-sm text-gray-700 dark:text-gray-300">{dimension.name}</span>
      </div>
      <input
        type="range"
        min="0.5"
        max="2.0"
        step="0.25"
        value={value}
        onChange={e => onChange(parseFloat(e.target.value))}
        className="flex-1 cursor-pointer"
      />
      <span className={`text-xs font-medium min-w-[36px] text-center ${value !== dimension.weight ? 'text-brand-600 dark:text-brand-400 font-bold' : 'text-gray-500 dark:text-gray-400'}`}>
        {value}x
      </span>
    </div>
  );
}

function SettingsView({ settings, onUpdate, data, onImport }) {
  const handleExport = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `dealscope-backup-${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const handleImport = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const imported = JSON.parse(ev.target.result);
        if (imported.deals) {
          onImport(imported);
        }
      } catch { alert('Invalid backup file'); }
    };
    reader.readAsText(file);
  };

  return (
    <div className="space-y-6 fade-in">
      <h2 className="text-lg font-bold text-gray-900 dark:text-white">Settings</h2>

      <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 space-y-4">
        <div className="flex items-center justify-between">
          <div>
            <p className="font-medium text-gray-900 dark:text-white text-sm">Dark Mode</p>
            <p className="text-xs text-gray-500 dark:text-gray-400">Easier on the eyes at night</p>
          </div>
          <button
            onClick={() => onUpdate({ ...settings, dark: !settings.dark })}
            className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors ${settings.dark ? 'bg-brand-600' : 'bg-gray-300'}`}
          >
            <span className={`inline-block h-4 w-4 transform rounded-full bg-white transition-transform ${settings.dark ? 'translate-x-6' : 'translate-x-1'}`} />
          </button>
        </div>
      </div>

      <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 space-y-3">
        <p className="font-medium text-gray-900 dark:text-white text-sm">Data</p>
        <div className="flex gap-2">
          <button onClick={handleExport} className="flex-1 text-sm px-3 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">
            Export Backup
          </button>
          <label className="flex-1 text-sm px-3 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors text-center cursor-pointer">
            Import Backup
            <input type="file" accept=".json" onChange={handleImport} className="hidden" />
          </label>
        </div>
      </div>

      <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 space-y-4">
        <div className="flex items-center justify-between">
          <p className="font-medium text-gray-900 dark:text-white text-sm">Dimension Weights</p>
          {settings.customWeights && (
            <button
              onClick={() => onUpdate({ ...settings, customWeights: null })}
              className="text-xs text-brand-600 dark:text-brand-400 hover:underline"
            >
              Reset to defaults
            </button>
          )}
        </div>
        <p className="text-xs text-gray-500 dark:text-gray-400">
          Adjust how much each dimension matters in the overall score. Higher weight = more influence.
        </p>
        <div className="space-y-3">
          {DIMENSIONS.map(dim => {
            const weights = settings.customWeights || DEFAULT_WEIGHTS;
            const currentVal = weights[dim.id] != null ? weights[dim.id] : dim.weight;
            return (
              <WeightSlider
                key={dim.id}
                dimension={dim}
                value={currentVal}
                onChange={val => {
                  const current = settings.customWeights || { ...DEFAULT_WEIGHTS };
                  onUpdate({ ...settings, customWeights: { ...current, [dim.id]: val } });
                }}
              />
            );
          })}
        </div>
      </div>

      <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4">
        <p className="font-medium text-gray-900 dark:text-white text-sm mb-2">Scoring Guide</p>
        <div className="space-y-1 text-xs text-gray-600 dark:text-gray-400">
          <p><span className="font-medium text-gray-900 dark:text-white">5 - Excellent:</span> Best case scenario. Rare.</p>
          <p><span className="font-medium text-gray-900 dark:text-white">4 - Good:</span> Above average. Would be happy with this.</p>
          <p><span className="font-medium text-gray-900 dark:text-white">3 - Average:</span> Acceptable. Not a differentiator.</p>
          <p><span className="font-medium text-gray-900 dark:text-white">2 - Below Avg:</span> Concerning but not a dealbreaker alone.</p>
          <p><span className="font-medium text-gray-900 dark:text-white">1 - Poor:</span> Significant issue. Needs to be offset by strengths elsewhere.</p>
        </div>
        <div className="mt-3 pt-3 border-t border-gray-100 dark:border-gray-700 space-y-1 text-xs text-gray-600 dark:text-gray-400">
          <p className="font-medium text-gray-900 dark:text-white mb-1">Default Weights</p>
          <p>Financials: 1.5x (most important, hard to fix)</p>
          <p>Automation: 1.25x (key to passive operation)</p>
          <p>Risk: 1.25x (downside protection matters)</p>
          <p>Growth &amp; Fit: 1.0x (important but fixable)</p>
          <p className="mt-1 italic">Customize weights above to match your acquisition thesis.</p>
        </div>
      </div>

      <p className="text-center text-xs text-gray-400 dark:text-gray-500">
        DealScope v1.1 - Your data stays in your browser.
      </p>
    </div>
  );
}

function App() {
  const [data, setData] = useState(loadData);
  const [settings, setSettings] = useState(loadSettings);
  const [selectedDealId, setSelectedDealId] = useState(null);
  const [view, setView] = useState('list'); // list, deal, compare, settings
  const [expandedDims, setExpandedDims] = useState({});

  useEffect(() => { saveData(data); }, [data]);
  useEffect(() => {
    saveSettings(settings);
    document.documentElement.classList.toggle('dark', settings.dark);
  }, [settings]);

  const selectedDeal = data.deals.find(d => d.id === selectedDealId);

  const addDeal = () => {
    const deal = createEmptyDeal('New Deal');
    setData(prev => ({ ...prev, deals: [...prev.deals, deal] }));
    setSelectedDealId(deal.id);
    setView('deal');
  };

  const updateDeal = (dealId, updates) => {
    setData(prev => ({
      ...prev,
      deals: prev.deals.map(d =>
        d.id === dealId ? { ...d, ...updates, updatedAt: new Date().toISOString() } : d
      )
    }));
  };

  const deleteDeal = (dealId) => {
    if (!confirm('Delete this deal evaluation?')) return;
    setData(prev => ({ ...prev, deals: prev.deals.filter(d => d.id !== dealId) }));
    setSelectedDealId(null);
    setView('list');
  };

  const handleScoreChange = (dealId, criterionId, value) => {
    setData(prev => ({
      ...prev,
      deals: prev.deals.map(d =>
        d.id === dealId
          ? { ...d, scores: { ...d.scores, [criterionId]: value }, updatedAt: new Date().toISOString() }
          : d
      )
    }));
  };

  const handleToggleFlag = (dealId, flagId) => {
    setData(prev => ({
      ...prev,
      deals: prev.deals.map(d => {
        if (d.id !== dealId) return d;
        const flags = d.redFlags.includes(flagId)
          ? d.redFlags.filter(f => f !== flagId)
          : [...d.redFlags, flagId];
        return { ...d, redFlags: flags, updatedAt: new Date().toISOString() };
      })
    }));
  };

  const toggleDimension = (dimId) => {
    setExpandedDims(prev => ({ ...prev, [dimId]: !prev[dimId] }));
  };

  const weights = settings.customWeights || null;

  // Stats
  const totalDeals = data.deals.length;
  const scoredDeals = data.deals.filter(d => calculateWeightedTotal(d, weights) > 0).length;
  const topDeal = data.deals.length > 0
    ? data.deals.reduce((best, d) => {
        const score = calculateWeightedTotal(d, weights);
        return score > calculateWeightedTotal(best, weights) ? d : best;
      }, data.deals[0])
    : null;

  return (
    <div className="min-h-screen bg-gray-50 dark:bg-gray-900 transition-colors">
      <div className="max-w-lg mx-auto px-4 pb-24">
        {/* Header */}
        <div className="pt-6 pb-4">
          <h1 className="text-xl font-bold text-gray-900 dark:text-white flex items-center gap-2">
            <span className="text-2xl">🔍</span> DealScope
          </h1>
          <p className="text-xs text-gray-500 dark:text-gray-400 mt-1">Score and compare acquisition opportunities</p>
        </div>

        {/* Content */}
        {view === 'list' && (
          <div className="space-y-4 fade-in">
            {/* Quick stats */}
            {totalDeals > 0 && (
              <div className="grid grid-cols-3 gap-2">
                <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-3 text-center">
                  <div className="text-lg font-bold text-gray-900 dark:text-white">{totalDeals}</div>
                  <div className="text-xs text-gray-500 dark:text-gray-400">Deals</div>
                </div>
                <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-3 text-center">
                  <div className="text-lg font-bold text-gray-900 dark:text-white">{scoredDeals}</div>
                  <div className="text-xs text-gray-500 dark:text-gray-400">Scored</div>
                </div>
                <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-3 text-center">
                  <div className="text-lg font-bold text-brand-600 dark:text-brand-400">
                    {topDeal && calculateWeightedTotal(topDeal, weights) > 0 ? calculateWeightedTotal(topDeal, weights).toFixed(1) : '-'}
                  </div>
                  <div className="text-xs text-gray-500 dark:text-gray-400">Top Score</div>
                </div>
              </div>
            )}

            {/* Deal list */}
            {data.deals.length === 0 ? (
              <div className="text-center py-16">
                <div className="text-4xl mb-4">🔍</div>
                <h2 className="text-lg font-semibold text-gray-900 dark:text-white mb-2">No deals yet</h2>
                <p className="text-sm text-gray-500 dark:text-gray-400 mb-6 max-w-xs mx-auto">
                  Add a business you're evaluating and score it across 5 dimensions to get a go/no-go verdict.
                </p>
                <button
                  onClick={addDeal}
                  className="px-6 py-2.5 bg-brand-600 text-white rounded-xl font-medium text-sm hover:bg-brand-700 transition-colors"
                >
                  Add First Deal
                </button>
              </div>
            ) : (
              <div className="space-y-2">
                {data.deals.map(deal => (
                  <DealCard
                    key={deal.id}
                    deal={deal}
                    onSelect={id => { setSelectedDealId(id); setView('deal'); }}
                    isSelected={deal.id === selectedDealId}
                    customWeights={weights}
                  />
                ))}
              </div>
            )}

            {data.deals.length > 0 && (
              <button
                onClick={addDeal}
                className="w-full py-3 border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl text-sm text-gray-500 dark:text-gray-400 hover:border-brand-400 hover:text-brand-600 dark:hover:text-brand-400 transition-colors"
              >
                + Add Deal
              </button>
            )}
          </div>
        )}

        {view === 'deal' && selectedDeal && (
          <div className="space-y-4 fade-in">
            {/* Back button */}
            <button
              onClick={() => setView('list')}
              className="text-sm text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white flex items-center gap-1"
            >
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>
              All Deals
            </button>

            {/* Deal info */}
            <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 space-y-3">
              <input
                type="text"
                value={selectedDeal.name}
                onChange={e => updateDeal(selectedDeal.id, { name: e.target.value })}
                className="w-full text-lg font-bold text-gray-900 dark:text-white bg-transparent border-none outline-none placeholder-gray-400"
                placeholder="Deal name"
              />
              <input
                type="url"
                value={selectedDeal.url}
                onChange={e => updateDeal(selectedDeal.id, { url: e.target.value })}
                className="w-full text-sm text-gray-600 dark:text-gray-400 bg-transparent border-none outline-none placeholder-gray-400"
                placeholder="Listing URL (optional)"
              />
              <div className="grid grid-cols-3 gap-2">
                <div>
                  <label className="text-xs text-gray-500 dark:text-gray-400">Asking Price</label>
                  <input
                    type="number"
                    value={selectedDeal.askingPrice}
                    onChange={e => updateDeal(selectedDeal.id, { askingPrice: e.target.value })}
                    className="w-full text-sm font-medium text-gray-900 dark:text-white bg-gray-50 dark:bg-gray-700 rounded-lg px-2 py-1.5 border border-gray-200 dark:border-gray-600 outline-none"
                    placeholder="$"
                  />
                </div>
                <div>
                  <label className="text-xs text-gray-500 dark:text-gray-400">Mo. Revenue</label>
                  <input
                    type="number"
                    value={selectedDeal.monthlyRevenue}
                    onChange={e => updateDeal(selectedDeal.id, { monthlyRevenue: e.target.value })}
                    className="w-full text-sm font-medium text-gray-900 dark:text-white bg-gray-50 dark:bg-gray-700 rounded-lg px-2 py-1.5 border border-gray-200 dark:border-gray-600 outline-none"
                    placeholder="$"
                  />
                </div>
                <div>
                  <label className="text-xs text-gray-500 dark:text-gray-400">Mo. Profit</label>
                  <input
                    type="number"
                    value={selectedDeal.monthlyProfit}
                    onChange={e => updateDeal(selectedDeal.id, { monthlyProfit: e.target.value })}
                    className="w-full text-sm font-medium text-gray-900 dark:text-white bg-gray-50 dark:bg-gray-700 rounded-lg px-2 py-1.5 border border-gray-200 dark:border-gray-600 outline-none"
                    placeholder="$"
                  />
                </div>
              </div>
              {selectedDeal.askingPrice && selectedDeal.monthlyProfit && (
                <div className="text-xs text-gray-500 dark:text-gray-400">
                  {(() => {
                    const m = calculateMultiple(selectedDeal.askingPrice, selectedDeal.monthlyProfit);
                    if (!m) return null;
                    const mf = parseFloat(m);
                    return (
                      <span>
                        <span className="font-semibold text-gray-900 dark:text-white">{m}x annual profit</span>
                        {' '}
                        {mf <= 3 ? '(attractive)' : mf <= 4.5 ? '(fair)' : '(premium)'}
                      </span>
                    );
                  })()}
                </div>
              )}
            </div>

            {/* Overall score */}
            {calculateWeightedTotal(selectedDeal, weights) > 0 && (
              <div className={`rounded-xl p-4 ${getVerdict(calculateWeightedTotal(selectedDeal, weights), selectedDeal.redFlags.length).bg}`}>
                <div className="flex items-center justify-between">
                  <div>
                    <div className="text-xs text-gray-600 dark:text-gray-400 mb-1">
                      Overall Score
                      {weights && <span className="ml-1 text-brand-500">(custom weights)</span>}
                    </div>
                    <div className="text-3xl font-bold text-gray-900 dark:text-white">
                      {calculateWeightedTotal(selectedDeal, weights).toFixed(1)}
                      <span className="text-lg text-gray-400">/5</span>
                    </div>
                  </div>
                  <div className={`text-lg font-bold ${getVerdict(calculateWeightedTotal(selectedDeal, weights), selectedDeal.redFlags.length).color}`}>
                    {getVerdict(calculateWeightedTotal(selectedDeal, weights), selectedDeal.redFlags.length).label}
                  </div>
                </div>
                <div className="mt-2">
                  <ScoreBar score={calculateWeightedTotal(selectedDeal, weights)} />
                </div>
              </div>
            )}

            {/* Scoring dimensions */}
            <div className="space-y-2">
              {DIMENSIONS.map(dim => (
                <DimensionCard
                  key={dim.id}
                  dimension={dim}
                  deal={selectedDeal}
                  onScoreChange={(criterionId, val) => handleScoreChange(selectedDeal.id, criterionId, val)}
                  expanded={expandedDims[dim.id] || false}
                  onToggle={() => toggleDimension(dim.id)}
                  activeWeight={weights ? weights[dim.id] : null}
                />
              ))}
            </div>

            {/* Red flags */}
            <RedFlagChecklist
              deal={selectedDeal}
              onToggleFlag={flagId => handleToggleFlag(selectedDeal.id, flagId)}
            />

            {/* Notes */}
            <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4">
              <h3 className="font-semibold text-gray-900 dark:text-white text-sm mb-2">Notes</h3>
              <textarea
                value={selectedDeal.notes}
                onChange={e => updateDeal(selectedDeal.id, { notes: e.target.value })}
                className="w-full text-sm text-gray-700 dark:text-gray-300 bg-transparent border-none outline-none resize-none placeholder-gray-400"
                rows={4}
                placeholder="Anything else worth noting about this deal..."
              />
            </div>

            {/* Delete */}
            <button
              onClick={() => deleteDeal(selectedDeal.id)}
              className="w-full text-sm text-red-500 hover:text-red-600 dark:hover:text-red-400 py-2"
            >
              Delete this deal
            </button>
          </div>
        )}

        {view === 'compare' && <CompareView deals={data.deals} customWeights={weights} />}
        {view === 'settings' && (
          <SettingsView
            settings={settings}
            onUpdate={setSettings}
            data={data}
            onImport={imported => { setData(imported); setSelectedDealId(null); }}
          />
        )}
      </div>

      {/* Bottom nav */}
      <nav className="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 px-4 py-2 z-50">
        <div className="max-w-lg mx-auto flex justify-around">
          {[
            { id: 'list', icon: '📋', label: 'Deals' },
            { id: 'compare', icon: '⚖️', label: 'Compare' },
            { id: 'settings', icon: '⚙️', label: 'Settings' },
          ].map(tab => (
            <button
              key={tab.id}
              onClick={() => setView(tab.id)}
              className={`flex flex-col items-center py-1 px-4 rounded-lg transition-colors ${
                view === tab.id
                  ? 'text-brand-600 dark:text-brand-400'
                  : 'text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300'
              }`}
            >
              <span className="text-lg">{tab.icon}</span>
              <span className="text-xs mt-0.5">{tab.label}</span>
            </button>
          ))}
        </div>
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PurePlant - Simple Plant Care Tracker</title>
<meta name="description" content="Log your plant care. Not a schedule that kills your plants. No accounts, no ads, no subscriptions.">
<meta property="og:title" content="PurePlant - Simple Plant Care Tracker">
<meta property="og:description" content="A plant care log, not an oracle. Track waterings, fertilizing, and repotting. Free forever. No ads.">
<meta property="og:type" content="website">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16a34a">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        brand: { 50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d' }
      }
    }
  }
}
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  body { font-family: 'Inter', system-ui, sans-serif; }
  .fade-in { animation: fadeIn 0.2s ease-in; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .pulse-water { animation: pulseWater 2s ease-in-out infinite; }
  @keyframes pulseWater { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
  .overdue-shake { animation: shake 0.5s ease-in-out; }
  @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-3px); } 75% { transform: translateX(3px); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

const STORAGE_KEY = 'pureplant-data';
const SETTINGS_KEY = 'pureplant-settings';

const PLANT_ICONS = ['🪴', '🌿', '🌱', '🌵', '🍀', '🌺', '🌻', '🌷', '🌹', '🌸', '🍃', '🎋', '🎍', '🌾', '🌳', '🌴'];
const PLANT_COLORS = [
  { name: 'Green', value: '#16a34a' },
  { name: 'Emerald', value: '#059669' },
  { name: 'Teal', value: '#0d9488' },
  { name: 'Blue', value: '#2563eb' },
  { name: 'Purple', value: '#7c3aed' },
  { name: 'Pink', value: '#db2777' },
  { name: 'Rose', value: '#e11d48' },
  { name: 'Orange', value: '#ea580c' },
  { name: 'Amber', value: '#d97706' },
  { name: 'Brown', value: '#92400e' },
];
const LOCATIONS = ['Living Room', 'Bedroom', 'Kitchen', 'Bathroom', 'Office', 'Balcony', 'Patio', 'Garden', 'Other'];
const LIGHT_LEVELS = ['Low', 'Medium', 'Bright Indirect', 'Direct Sun'];

function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function today() { return new Date().toISOString().split('T')[0]; }
function daysBetween(d1, d2) { return Math.round((new Date(d2) - new Date(d1)) / 86400000); }
function formatDate(d) { return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
function formatDateLong(d) { return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' }); }

function defaultData() {
  return { plants: [], waterLog: [] };
}

function loadData() {
  try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : defaultData(); }
  catch { return defaultData(); }
}
function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
function loadSettings() {
  try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || { dark: false, sortBy: 'urgency' }; }
  catch { return { dark: false, sortBy: 'urgency' }; }
}
function saveSettings(s) { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }

function getWateringStatus(plant, waterLog) {
  const logs = waterLog
    .filter(l => l.plantId === plant.id && l.type === 'water')
    .sort((a, b) => b.date.localeCompare(a.date));
  const lastWatered = logs[0]?.date || null;
  if (!lastWatered) return { status: 'never', daysSince: null, daysUntil: null, lastWatered: null };
  const daysSince = daysBetween(lastWatered, today());
  const daysUntil = plant.frequencyDays - daysSince;
  let status = 'ok';
  if (daysUntil < 0) status = 'overdue';
  else if (daysUntil === 0) status = 'today';
  else if (daysUntil === 1) status = 'tomorrow';
  return { status, daysSince, daysUntil, lastWatered };
}

function PlantCard({ plant, waterLog, onWater, onEdit }) {
  const ws = getWateringStatus(plant, waterLog);
  const statusColors = {
    overdue: 'border-red-400 dark:border-red-500 bg-red-50 dark:bg-red-950/30',
    today: 'border-amber-400 dark:border-amber-500 bg-amber-50 dark:bg-amber-950/30',
    tomorrow: 'border-blue-300 dark:border-blue-400 bg-blue-50 dark:bg-blue-950/20',
    ok: 'border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800',
    never: 'border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800',
  };
  const statusText = {
    overdue: `Check - ${Math.abs(ws.daysUntil)} day${Math.abs(ws.daysUntil) !== 1 ? 's' : ''} past schedule`,
    today: 'Check today',
    tomorrow: 'Check tomorrow',
    ok: `${ws.daysUntil} day${ws.daysUntil !== 1 ? 's' : ''} until next`,
    never: 'Never watered',
  };
  const statusDot = {
    overdue: 'bg-red-500 pulse-water',
    today: 'bg-amber-500 pulse-water',
    tomorrow: 'bg-blue-400',
    ok: 'bg-green-500',
    never: 'bg-gray-400',
  };

  return (
    <div className={`fade-in border-2 rounded-xl p-4 transition-all ${statusColors[ws.status]} ${ws.status === 'overdue' ? 'overdue-shake' : ''}`}>
      <div className="flex items-start justify-between">
        <div className="flex items-center gap-3">
          <div className="text-3xl" style={{ filter: plant.color ? `drop-shadow(0 0 4px ${plant.color}40)` : undefined }}>{plant.icon}</div>
          <div>
            <h3 className="font-semibold text-gray-900 dark:text-white">{plant.name}</h3>
            <div className="flex items-center gap-2 mt-0.5">
              {plant.location && <span className="text-xs text-gray-500 dark:text-gray-400">{plant.location}</span>}
              {plant.light && <span className="text-xs text-gray-400 dark:text-gray-500">| {plant.light}</span>}
            </div>
          </div>
        </div>
        <div className="flex items-center gap-1">
          <button onClick={() => onEdit(plant)} className="p-1.5 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700" title="Edit">
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
          </button>
        </div>
      </div>
      <div className="mt-3 flex items-center justify-between">
        <div className="flex items-center gap-2">
          <div className={`w-2 h-2 rounded-full ${statusDot[ws.status]}`}></div>
          <span className={`text-sm font-medium ${ws.status === 'overdue' ? 'text-red-600 dark:text-red-400' : ws.status === 'today' ? 'text-amber-600 dark:text-amber-400' : 'text-gray-600 dark:text-gray-400'}`}>
            {statusText[ws.status]}
          </span>
        </div>
        <div className="flex items-center gap-1">
          <button onClick={() => onWater(plant.id, 'water')}
            className="flex items-center gap-1 px-2.5 py-1.5 bg-blue-500 hover:bg-blue-600 text-white text-sm font-medium rounded-l-lg transition-colors" title="Water">
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3c-4.97 4.97-7 8-7 11a7 7 0 1014 0c0-3-2.03-6.03-7-11z" /></svg>
            Water
          </button>
          <button onClick={() => onWater(plant.id, 'fertilize')}
            className="px-2 py-1.5 bg-amber-500 hover:bg-amber-600 text-white text-sm font-medium transition-colors" title="Fertilize">
            🧪
          </button>
          <button onClick={() => onWater(plant.id, 'repot')}
            className="px-2 py-1.5 bg-orange-500 hover:bg-orange-600 text-white text-sm font-medium rounded-r-lg transition-colors" title="Repot">
            🪴
          </button>
        </div>
      </div>
      {ws.lastWatered && (
        <div className="mt-2 text-xs text-gray-400 dark:text-gray-500">
          Last watered: {formatDate(ws.lastWatered)} ({ws.daysSince} day{ws.daysSince !== 1 ? 's' : ''} ago)
          <span className="mx-1">|</span>
          Every {plant.frequencyDays} day{plant.frequencyDays !== 1 ? 's' : ''}
        </div>
      )}
      {plant.notes && (
        <div className="mt-2 text-xs text-gray-500 dark:text-gray-400 italic border-t border-gray-100 dark:border-gray-700 pt-2">{plant.notes}</div>
      )}
    </div>
  );
}

function PlantForm({ plant, onSave, onCancel, onDelete }) {
  const [form, setForm] = useState(plant || {
    id: generateId(),
    name: '',
    icon: '🪴',
    color: '#16a34a',
    frequencyDays: 7,
    location: '',
    light: '',
    notes: '',
    archived: false,
  });
  const isEdit = !!plant;

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!form.name.trim()) return;
    onSave({ ...form, name: form.name.trim(), notes: (form.notes || '').trim() });
  };

  return (
    <form onSubmit={handleSubmit} className="fade-in space-y-4">
      <h2 className="text-lg font-semibold text-gray-900 dark:text-white">{isEdit ? 'Edit Plant' : 'Add Plant'}</h2>

      <div>
        <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Name *</label>
        <input
          type="text" value={form.name} onChange={e => setForm({...form, name: e.target.value})}
          className="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:ring-2 focus:ring-brand-500 focus:border-transparent"
          placeholder="e.g., Monstera Deliciosa" autoFocus required
        />
      </div>

      <div>
        <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Icon</label>
        <div className="flex flex-wrap gap-2">
          {PLANT_ICONS.map(icon => (
            <button key={icon} type="button" onClick={() => setForm({...form, icon})}
              className={`text-2xl p-1.5 rounded-lg transition-all ${form.icon === icon ? 'bg-brand-100 dark:bg-brand-900 ring-2 ring-brand-500 scale-110' : 'hover:bg-gray-100 dark:hover:bg-gray-700'}`}
            >{icon}</button>
          ))}
        </div>
      </div>

      <div>
        <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
          Watering Frequency: every <strong>{form.frequencyDays}</strong> day{form.frequencyDays !== 1 ? 's' : ''}
        </label>
        <input
          type="range" min="1" max="60" value={form.frequencyDays}
          onChange={e => setForm({...form, frequencyDays: parseInt(e.target.value)})}
          className="w-full accent-brand-600"
        />
        <div className="flex justify-between text-xs text-gray-400 mt-1">
          <span>Daily</span>
          <span>Weekly</span>
          <span>Bi-weekly</span>
          <span>Monthly</span>
          <span>60d</span>
        </div>
        <div className="flex gap-2 mt-2">
          {[1, 3, 7, 10, 14, 21, 30].map(d => (
            <button key={d} type="button" onClick={() => setForm({...form, frequencyDays: d})}
              className={`px-2 py-1 text-xs rounded-md transition-colors ${form.frequencyDays === d ? 'bg-brand-600 text-white' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-600'}`}
            >{d}d</button>
          ))}
        </div>
      </div>

      <div className="grid grid-cols-2 gap-3">
        <div>
          <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Location</label>
          <select value={form.location} onChange={e => setForm({...form, location: e.target.value})}
            className="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-white">
            <option value="">None</option>
            {LOCATIONS.map(l => <option key={l} value={l}>{l}</option>)}
          </select>
        </div>
        <div>
          <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Light</label>
          <select value={form.light} onChange={e => setForm({...form, light: e.target.value})}
            className="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-white">
            <option value="">None</option>
            {LIGHT_LEVELS.map(l => <option key={l} value={l}>{l}</option>)}
          </select>
        </div>
      </div>

      <div>
        <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Color</label>
        <div className="flex flex-wrap gap-2">
          {PLANT_COLORS.map(c => (
            <button key={c.value} type="button" onClick={() => setForm({...form, color: c.value})}
              className={`w-7 h-7 rounded-full transition-all ${form.color === c.value ? 'ring-2 ring-offset-2 ring-gray-400 dark:ring-offset-gray-900 scale-110' : 'hover:scale-110'}`}
              style={{ backgroundColor: c.value }} title={c.name}
            />
          ))}
        </div>
      </div>

      <div>
        <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Notes</label>
        <textarea value={form.notes || ''} onChange={e => setForm({...form, notes: e.target.value})}
          className="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-white resize-none"
          rows={2} placeholder="e.g., Likes humidity, sensitive to overwatering"
        />
      </div>

      <div className="flex gap-2 pt-2">
        <button type="submit" className="flex-1 py-2 bg-brand-600 hover:bg-brand-700 text-white font-medium rounded-lg transition-colors">
          {isEdit ? 'Save Changes' : 'Add Plant'}
        </button>
        <button type="button" onClick={onCancel} className="px-4 py-2 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
          Cancel
        </button>
        {isEdit && (
          <button type="button" onClick={() => onDelete(plant.id)}
            className="px-4 py-2 border border-red-300 dark:border-red-600 text-red-600 dark:text-red-400 rounded-lg hover:bg-red-50 dark:hover:bg-red-950/30 transition-colors">
            Delete
          </button>
        )}
      </div>
    </form>
  );
}

function WaterHistory({ waterLog, plants }) {
  const grouped = useMemo(() => {
    const sorted = [...waterLog].sort((a, b) => b.date.localeCompare(a.date) || b.timestamp - a.timestamp);
    const groups = {};
    sorted.forEach(l => {
      if (!groups[l.date]) groups[l.date] = [];
      groups[l.date].push(l);
    });
    return Object.entries(groups).slice(0, 30);
  }, [waterLog]);

  const plantMap = useMemo(() => {
    const m = {};
    plants.forEach(p => { m[p.id] = p; });
    return m;
  }, [plants]);

  if (grouped.length === 0) {
    return <div className="text-center text-gray-500 dark:text-gray-400 py-8">No watering history yet. Water a plant to get started!</div>;
  }

  return (
    <div className="space-y-4 fade-in">
      <h2 className="text-lg font-semibold text-gray-900 dark:text-white">Care History</h2>
      {grouped.map(([date, logs]) => (
        <div key={date}>
          <div className="text-xs font-medium text-gray-500 dark:text-gray-400 mb-1.5">{formatDateLong(date)}</div>
          <div className="space-y-1">
            {logs.map(l => {
              const p = plantMap[l.plantId];
              const actionBg = { water: 'bg-blue-50 dark:bg-blue-950/20', fertilize: 'bg-amber-50 dark:bg-amber-950/20', repot: 'bg-orange-50 dark:bg-orange-950/20' };
              const actionIcon = { water: '💧', fertilize: '🧪', repot: '🪴' };
              const actionLabel = { water: 'Watered', fertilize: 'Fertilized', repot: 'Repotted' };
              return (
                <div key={l.id} className={`flex items-center gap-2 py-1.5 px-3 rounded-lg text-sm ${actionBg[l.type] || actionBg.water}`}>
                  <span className="text-lg">{p?.icon || '🪴'}</span>
                  <span className="text-gray-700 dark:text-gray-300">{p?.name || 'Unknown plant'}</span>
                  <span className="ml-auto text-xs text-gray-500 dark:text-gray-400">{actionLabel[l.type] || l.type}</span>
                  <span>{actionIcon[l.type] || '💧'}</span>
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

function Stats({ plants, waterLog }) {
  const stats = useMemo(() => {
    const total = plants.length;
    const statuses = plants.map(p => getWateringStatus(p, waterLog));
    const overdue = statuses.filter(s => s.status === 'overdue').length;
    const dueToday = statuses.filter(s => s.status === 'today').length;
    const healthy = statuses.filter(s => s.status === 'ok' || s.status === 'tomorrow').length;
    const neverWatered = statuses.filter(s => s.status === 'never').length;
    const totalWaterings = waterLog.filter(l => l.type === 'water').length;

    // Last 7 days watering count
    const sevenDaysAgo = new Date();
    sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
    const sevenDayStr = sevenDaysAgo.toISOString().split('T')[0];
    const last7 = waterLog.filter(l => l.type === 'water' && l.date >= sevenDayStr).length;

    // Location breakdown
    const byLocation = {};
    plants.forEach(p => {
      const loc = p.location || 'No location';
      byLocation[loc] = (byLocation[loc] || 0) + 1;
    });

    return { total, overdue, dueToday, healthy, neverWatered, totalWaterings, last7, byLocation };
  }, [plants, waterLog]);

  return (
    <div className="fade-in space-y-4">
      <h2 className="text-lg font-semibold text-gray-900 dark:text-white">Stats</h2>
      <div className="grid grid-cols-2 gap-3">
        <div className="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 text-center">
          <div className="text-3xl font-bold text-brand-600">{stats.total}</div>
          <div className="text-xs text-gray-500 dark:text-gray-400 mt-1">Total Plants</div>
        </div>
        <div className="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 text-center">
          <div className="text-3xl font-bold text-blue-500">{stats.totalWaterings}</div>
          <div className="text-xs text-gray-500 dark:text-gray-400 mt-1">Total Waterings</div>
        </div>
        <div className="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 text-center">
          <div className={`text-3xl font-bold ${stats.overdue > 0 ? 'text-red-500' : 'text-green-500'}`}>{stats.overdue}</div>
          <div className="text-xs text-gray-500 dark:text-gray-400 mt-1">Overdue</div>
        </div>
        <div className="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 text-center">
          <div className="text-3xl font-bold text-blue-500">{stats.last7}</div>
          <div className="text-xs text-gray-500 dark:text-gray-400 mt-1">Last 7 Days</div>
        </div>
      </div>

      {Object.keys(stats.byLocation).length > 0 && (
        <div className="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4">
          <h3 className="text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">By Location</h3>
          <div className="space-y-1.5">
            {Object.entries(stats.byLocation).sort((a, b) => b[1] - a[1]).map(([loc, count]) => (
              <div key={loc} className="flex items-center justify-between text-sm">
                <span className="text-gray-600 dark:text-gray-400">{loc}</span>
                <div className="flex items-center gap-2">
                  <div className="w-24 h-2 bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden">
                    <div className="h-full bg-brand-500 rounded-full" style={{ width: `${(count / stats.total) * 100}%` }}></div>
                  </div>
                  <span className="text-gray-500 dark:text-gray-400 text-xs w-6 text-right">{count}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4">
        <h3 className="text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Health Overview</h3>
        <div className="flex gap-1 h-6 rounded-lg overflow-hidden">
          {stats.healthy > 0 && <div className="bg-green-500" style={{ flex: stats.healthy }} title={`${stats.healthy} healthy`}></div>}
          {stats.dueToday > 0 && <div className="bg-amber-500" style={{ flex: stats.dueToday }} title={`${stats.dueToday} due today`}></div>}
          {stats.overdue > 0 && <div className="bg-red-500" style={{ flex: stats.overdue }} title={`${stats.overdue} overdue`}></div>}
          {stats.neverWatered > 0 && <div className="bg-gray-400" style={{ flex: stats.neverWatered }} title={`${stats.neverWatered} never watered`}></div>}
        </div>
        <div className="flex gap-4 mt-2 text-xs text-gray-500 dark:text-gray-400">
          {stats.healthy > 0 && <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-green-500"></span> Healthy ({stats.healthy})</span>}
          {stats.dueToday > 0 && <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-amber-500"></span> Due ({stats.dueToday})</span>}
          {stats.overdue > 0 && <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-red-500"></span> Overdue ({stats.overdue})</span>}
          {stats.neverWatered > 0 && <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-gray-400"></span> New ({stats.neverWatered})</span>}
        </div>
      </div>
    </div>
  );
}

function SettingsView({ data, settings, onSettingsChange, onImport, onExport }) {
  return (
    <div className="fade-in space-y-4">
      <h2 className="text-lg font-semibold text-gray-900 dark:text-white">Settings</h2>

      <div className="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4">
        <div className="flex items-center justify-between">
          <div>
            <div className="text-sm font-medium text-gray-700 dark:text-gray-300">Dark Mode</div>
            <div className="text-xs text-gray-500 dark:text-gray-400">Switch between light and dark theme</div>
          </div>
          <button onClick={() => onSettingsChange({ ...settings, dark: !settings.dark })}
            className={`relative w-11 h-6 rounded-full transition-colors ${settings.dark ? 'bg-brand-600' : 'bg-gray-300'}`}>
            <div className={`absolute top-0.5 w-5 h-5 rounded-full bg-white shadow transition-transform ${settings.dark ? 'translate-x-[22px]' : 'translate-x-0.5'}`}></div>
          </button>
        </div>
      </div>

      <div className="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4">
        <div className="text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Sort Plants By</div>
        <div className="flex gap-2">
          {[['urgency', 'Urgency'], ['name', 'Name'], ['location', 'Location']].map(([val, label]) => (
            <button key={val} onClick={() => onSettingsChange({ ...settings, sortBy: val })}
              className={`px-3 py-1.5 text-sm rounded-lg transition-colors ${settings.sortBy === val ? 'bg-brand-600 text-white' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-600'}`}
            >{label}</button>
          ))}
        </div>
      </div>

      <div className="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 space-y-3">
        <div className="text-sm font-medium text-gray-700 dark:text-gray-300">Data</div>
        <div className="flex gap-2">
          <button onClick={onExport}
            className="flex-1 py-2 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors text-sm">
            Export JSON
          </button>
          <label className="flex-1 py-2 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors text-sm text-center cursor-pointer">
            Import JSON
            <input type="file" accept=".json" onChange={onImport} className="hidden" />
          </label>
        </div>
        <div className="text-xs text-gray-400 dark:text-gray-500">
          {data.plants.length} plant{data.plants.length !== 1 ? 's' : ''}, {data.waterLog.length} log entries
        </div>
      </div>
    </div>
  );
}

function App() {
  const [data, setData] = useState(loadData);
  const [settings, setSettings] = useState(loadSettings);
  const [view, setView] = useState('plants'); // plants, history, stats, settings
  const [editingPlant, setEditingPlant] = useState(null); // null | 'new' | plant object
  const [toast, setToast] = useState(null);

  useEffect(() => { saveData(data); }, [data]);
  useEffect(() => {
    saveSettings(settings);
    document.documentElement.classList.toggle('dark', settings.dark);
  }, [settings]);

  const showToast = useCallback((msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2500);
  }, []);

  const ACTION_LABELS = { water: 'watered', fertilize: 'fertilized', repot: 'repotted' };
  const ACTION_ICONS = { water: '💧', fertilize: '🧪', repot: '🪴' };

  const handleWater = useCallback((plantId, actionType = 'water') => {
    const plant = data.plants.find(p => p.id === plantId);
    setData(prev => ({
      ...prev,
      waterLog: [...prev.waterLog, { id: generateId(), plantId, type: actionType, date: today(), timestamp: Date.now() }]
    }));
    showToast(`${plant?.icon || '🪴'} ${plant?.name || 'Plant'} ${ACTION_LABELS[actionType] || actionType}!`);
  }, [data.plants, showToast]);

  const handleSavePlant = useCallback((plant) => {
    setData(prev => {
      const exists = prev.plants.some(p => p.id === plant.id);
      return {
        ...prev,
        plants: exists ? prev.plants.map(p => p.id === plant.id ? plant : p) : [...prev.plants, plant]
      };
    });
    setEditingPlant(null);
    showToast(data.plants.some(p => p.id === plant.id) ? 'Plant updated!' : `${plant.icon} ${plant.name} added!`);
  }, [data.plants, showToast]);

  const handleDeletePlant = useCallback((plantId) => {
    const plant = data.plants.find(p => p.id === plantId);
    if (!confirm(`Delete ${plant?.name || 'this plant'}? This also removes its watering history.`)) return;
    setData(prev => ({
      plants: prev.plants.filter(p => p.id !== plantId),
      waterLog: prev.waterLog.filter(l => l.plantId !== plantId)
    }));
    setEditingPlant(null);
    showToast('Plant deleted');
  }, [data.plants, showToast]);

  const handleExport = useCallback(() => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `pureplant-backup-${today()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Data exported!');
  }, [data, showToast]);

  const handleImport = useCallback((e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const imported = JSON.parse(ev.target.result);
        if (imported.plants && imported.waterLog) {
          setData(imported);
          showToast(`Imported ${imported.plants.length} plants!`);
        } else {
          showToast('Invalid backup file');
        }
      } catch { showToast('Error reading file'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  }, [showToast]);

  const sortedPlants = useMemo(() => {
    const withStatus = data.plants.map(p => ({ ...p, ws: getWateringStatus(p, data.waterLog) }));
    const urgencyOrder = { overdue: 0, today: 1, tomorrow: 2, never: 3, ok: 4 };
    switch (settings.sortBy) {
      case 'name': return withStatus.sort((a, b) => a.name.localeCompare(b.name));
      case 'location': return withStatus.sort((a, b) => (a.location || 'zzz').localeCompare(b.location || 'zzz') || urgencyOrder[a.ws.status] - urgencyOrder[b.ws.status]);
      default: return withStatus.sort((a, b) => urgencyOrder[a.ws.status] - urgencyOrder[b.ws.status] || (a.ws.daysUntil ?? 999) - (b.ws.daysUntil ?? 999));
    }
  }, [data.plants, data.waterLog, settings.sortBy]);

  const overduePlants = sortedPlants.filter(p => p.ws.status === 'overdue' || p.ws.status === 'today');
  const tabs = [
    { id: 'plants', label: 'Plants', icon: '🪴' },
    { id: 'history', label: 'History', icon: '💧' },
    { id: 'stats', label: 'Stats', icon: '📊' },
    { id: 'settings', label: 'Settings', icon: '⚙️' },
  ];

  return (
    <div className="min-h-screen bg-gray-50 dark:bg-gray-900 transition-colors">
      {/* Header */}
      <div className="bg-brand-600 dark:bg-brand-800 text-white">
        <div className="max-w-lg mx-auto px-4 py-4">
          <div className="flex items-center justify-between">
            <div>
              <h1 className="text-xl font-bold flex items-center gap-2">🌿 PurePlant</h1>
              <p className="text-brand-200 text-xs mt-0.5">A log, not an oracle</p>
            </div>
            <div className="text-right">
              <div className="text-2xl font-bold">{data.plants.length}</div>
              <div className="text-brand-200 text-xs">plant{data.plants.length !== 1 ? 's' : ''}</div>
            </div>
          </div>
          {overduePlants.length > 0 && view === 'plants' && (
            <div className="mt-3 bg-white/10 rounded-lg px-3 py-2 text-sm">
              <span className="font-medium">{overduePlants.length}</span> plant{overduePlants.length !== 1 ? 's' : ''} to check
            </div>
          )}
        </div>
      </div>

      {/* Content */}
      <div className="max-w-lg mx-auto px-4 py-4 pb-24">
        {editingPlant !== null ? (
          <PlantForm
            plant={editingPlant === 'new' ? null : editingPlant}
            onSave={handleSavePlant}
            onCancel={() => setEditingPlant(null)}
            onDelete={handleDeletePlant}
          />
        ) : view === 'plants' ? (
          <div className="space-y-3">
            {sortedPlants.length === 0 ? (
              <div className="text-center py-12">
                <div className="text-5xl mb-3">🌱</div>
                <p className="text-gray-500 dark:text-gray-400 mb-4">No plants yet. Add your first one!</p>
                <button onClick={() => setEditingPlant('new')}
                  className="px-6 py-2 bg-brand-600 hover:bg-brand-700 text-white font-medium rounded-lg transition-colors">
                  Add Plant
                </button>
              </div>
            ) : (
              sortedPlants.map(p => (
                <PlantCard key={p.id} plant={p} waterLog={data.waterLog}
                  onWater={handleWater} onEdit={setEditingPlant} onDelete={handleDeletePlant} />
              ))
            )}
          </div>
        ) : view === 'history' ? (
          <WaterHistory waterLog={data.waterLog} plants={data.plants} />
        ) : view === 'stats' ? (
          <Stats plants={data.plants} waterLog={data.waterLog} />
        ) : (
          <SettingsView data={data} settings={settings}
            onSettingsChange={setSettings} onImport={handleImport} onExport={handleExport} />
        )}
      </div>

      {/* FAB */}
      {view === 'plants' && editingPlant === null && (
        <button onClick={() => setEditingPlant('new')}
          className="fixed bottom-20 right-4 w-14 h-14 bg-brand-600 hover:bg-brand-700 text-white rounded-full shadow-lg flex items-center justify-center text-2xl transition-all hover:scale-110 z-10"
          title="Add plant"
        >+</button>
      )}

      {/* Bottom Nav */}
      <nav className="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 z-20">
        <div className="max-w-lg mx-auto flex">
          {tabs.map(t => (
            <button key={t.id} onClick={() => { setView(t.id); setEditingPlant(null); }}
              className={`flex-1 py-3 text-center transition-colors ${view === t.id ? 'text-brand-600 dark:text-brand-400' : 'text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300'}`}>
              <div className="text-lg">{t.icon}</div>
              <div className="text-[10px] font-medium mt-0.5">{t.label}</div>
            </button>
          ))}
        </div>
      </nav>

      {/* Toast */}
      {toast && (
        <div className="fixed top-4 left-1/2 -translate-x-1/2 bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900 px-4 py-2 rounded-lg shadow-lg text-sm font-medium fade-in z-50">
          {toast}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>

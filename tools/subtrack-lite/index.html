<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SubTrack Lite - Simple Subscription Tracker</title>
<meta name="description" content="Track your subscriptions without ads, accounts, or bloat. Your data stays in your browser.">
<meta property="og:title" content="SubTrack Lite - Simple Subscription Tracker">
<meta property="og:description" content="Track your subscriptions without ads, accounts, or bloat. Free forever.">
<meta property="og:type" content="website">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#22c55e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="SubTrack">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        brand: { 50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d' }
      }
    }
  }
}
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  body { font-family: 'Inter', system-ui, sans-serif; }
  .fade-in { animation: fadeIn 0.2s ease-in; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .modal-overlay { animation: overlayIn 0.15s ease-out; }
  @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

// ---- Data layer ----
const STORAGE_KEY = 'subtrack-lite-data';
const SETTINGS_KEY = 'subtrack-lite-settings';

const CATEGORIES = [
  'Streaming', 'Music', 'Software', 'Cloud', 'Gaming', 'News',
  'Fitness', 'Food', 'Shopping', 'Education', 'Finance', 'Other'
];

const CATEGORY_COLORS = {
  Streaming: '#ef4444', Music: '#a855f7', Software: '#3b82f6', Cloud: '#06b6d4',
  Gaming: '#f97316', News: '#64748b', Fitness: '#22c55e', Food: '#eab308',
  Shopping: '#ec4899', Education: '#8b5cf6', Finance: '#14b8a6', Other: '#6b7280'
};

const CYCLES = [
  { value: 'weekly', label: 'Weekly', perYear: 52 },
  { value: 'monthly', label: 'Monthly', perYear: 12 },
  { value: 'quarterly', label: 'Quarterly', perYear: 4 },
  { value: 'semi-annual', label: 'Every 6 months', perYear: 2 },
  { value: 'annual', label: 'Annual', perYear: 1 },
];

function loadSubs() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function saveSubs(subs) { localStorage.setItem(STORAGE_KEY, JSON.stringify(subs)); }
function loadSettings() {
  try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || { dark: false, currency: 'USD' }; }
  catch { return { dark: false, currency: 'USD' }; }
}
function saveSettings(s) { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function getNextRenewal(startDate, cycle) {
  const now = new Date();
  now.setHours(0, 0, 0, 0);
  let d = new Date(startDate + 'T00:00:00');
  if (isNaN(d.getTime())) return null;
  const inc = { weekly: [0, 0, 7], monthly: [0, 1, 0], quarterly: [0, 3, 0], 'semi-annual': [0, 6, 0], annual: [1, 0, 0] }[cycle] || [0, 1, 0];
  let safety = 0;
  while (d < now && safety < 1000) {
    d = new Date(d.getFullYear() + inc[0], d.getMonth() + inc[1], d.getDate() + inc[2]);
    safety++;
  }
  return d;
}

function daysUntil(date) {
  if (!date) return Infinity;
  const now = new Date(); now.setHours(0, 0, 0, 0);
  return Math.round((date - now) / 86400000);
}

function formatDate(d) {
  if (!d) return '-';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function formatCurrency(amount, currency) {
  return new Intl.NumberFormat('en-US', { style: 'currency', currency }).format(amount);
}

function annualCost(cost, cycle) {
  const c = CYCLES.find(x => x.value === cycle);
  return cost * (c ? c.perYear : 12);
}

function monthlyCost(cost, cycle) {
  return annualCost(cost, cycle) / 12;
}

// ---- Icons (inline SVG) ----
const Icon = ({ name, size = 20, className = '' }) => {
  const icons = {
    plus: <path d="M12 5v14M5 12h14" />,
    edit: <><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" /><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" /></>,
    trash: <><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6" /><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2" /></>,
    x: <><path d="M18 6L6 18M6 6l12 12" /></>,
    sun: <><circle cx="12" cy="12" r="5" /><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" /></>,
    moon: <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />,
    download: <><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></>,
    upload: <><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" /><polyline points="17 8 12 3 7 8" /><line x1="12" y1="3" x2="12" y2="15" /></>,
    calendar: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></>,
    dollar: <><line x1="12" y1="1" x2="12" y2="23" /><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6" /></>,
    filter: <><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" /></>,
    check: <polyline points="20 6 9 17 4 12" />,
    alert: <><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" /><line x1="12" y1="9" x2="12" y2="13" /><line x1="12" y1="17" x2="12.01" y2="17" /></>,
    search: <><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></>,
  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
      strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
      {icons[name]}
    </svg>
  );
};

// ---- Modal ----
function Modal({ open, onClose, title, children }) {
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay"
      onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="absolute inset-0 bg-black/40" />
      <div className="relative bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-md max-h-[90vh] overflow-y-auto fade-in">
        <div className="flex items-center justify-between p-5 border-b border-gray-200 dark:border-gray-700">
          <h2 className="text-lg font-semibold text-gray-900 dark:text-white">{title}</h2>
          <button onClick={onClose} className="p-1 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-500">
            <Icon name="x" size={20} />
          </button>
        </div>
        <div className="p-5">{children}</div>
      </div>
    </div>
  );
}

// ---- Subscription Form ----
function SubForm({ sub, onSave, onCancel }) {
  const [form, setForm] = useState(sub || {
    name: '', cost: '', cycle: 'monthly', category: 'Software',
    startDate: new Date().toISOString().slice(0, 10), notes: '', active: true
  });
  const nameRef = useRef(null);
  useEffect(() => { nameRef.current?.focus(); }, []);

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!form.name.trim() || !form.cost) return;
    onSave({ ...form, cost: parseFloat(form.cost), id: form.id || genId() });
  };

  return (
    <form onSubmit={handleSubmit} className="space-y-4">
      <div>
        <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Name</label>
        <input ref={nameRef} type="text" value={form.name} onChange={e => set('name', e.target.value)}
          placeholder="Netflix, Spotify, etc."
          className="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none" required />
      </div>
      <div className="grid grid-cols-2 gap-3">
        <div>
          <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Cost</label>
          <input type="number" step="0.01" min="0" value={form.cost} onChange={e => set('cost', e.target.value)}
            placeholder="9.99"
            className="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none" required />
        </div>
        <div>
          <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Billing Cycle</label>
          <select value={form.cycle} onChange={e => set('cycle', e.target.value)}
            className="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none">
            {CYCLES.map(c => <option key={c.value} value={c.value}>{c.label}</option>)}
          </select>
        </div>
      </div>
      <div className="grid grid-cols-2 gap-3">
        <div>
          <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Category</label>
          <select value={form.category} onChange={e => set('category', e.target.value)}
            className="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none">
            {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
        </div>
        <div>
          <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Start Date</label>
          <input type="date" value={form.startDate} onChange={e => set('startDate', e.target.value)}
            className="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none" />
        </div>
      </div>
      <div>
        <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Notes (optional)</label>
        <input type="text" value={form.notes || ''} onChange={e => set('notes', e.target.value)}
          placeholder="Shared account, cancel after trial, etc."
          className="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none" />
      </div>
      <div className="flex items-center gap-2">
        <input type="checkbox" id="active" checked={form.active !== false}
          onChange={e => set('active', e.target.checked)}
          className="w-4 h-4 rounded border-gray-300 text-brand-600 focus:ring-brand-500" />
        <label htmlFor="active" className="text-sm text-gray-700 dark:text-gray-300">Active subscription</label>
      </div>
      <div className="flex gap-2 pt-2">
        <button type="submit"
          className="flex-1 px-4 py-2.5 bg-brand-600 hover:bg-brand-700 text-white rounded-lg font-medium transition-colors">
          {sub ? 'Update' : 'Add Subscription'}
        </button>
        <button type="button" onClick={onCancel}
          className="px-4 py-2.5 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 rounded-lg font-medium transition-colors">
          Cancel
        </button>
      </div>
    </form>
  );
}

// ---- Stat Card ----
function StatCard({ label, value, sub, color = 'brand' }) {
  return (
    <div className="bg-white dark:bg-gray-800 rounded-xl p-4 border border-gray-200 dark:border-gray-700">
      <div className="text-sm text-gray-500 dark:text-gray-400 mb-1">{label}</div>
      <div className={`text-2xl font-bold text-${color}-600 dark:text-${color}-400`}>{value}</div>
      {sub && <div className="text-xs text-gray-400 dark:text-gray-500 mt-1">{sub}</div>}
    </div>
  );
}

// ---- Category Bar Chart ----
function CategoryChart({ subs, currency }) {
  const cats = useMemo(() => {
    const map = {};
    subs.filter(s => s.active !== false).forEach(s => {
      const cat = s.category || 'Other';
      map[cat] = (map[cat] || 0) + monthlyCost(s.cost, s.cycle);
    });
    return Object.entries(map).sort((a, b) => b[1] - a[1]);
  }, [subs]);

  if (cats.length === 0) return null;
  const max = cats[0][1];

  return (
    <div className="bg-white dark:bg-gray-800 rounded-xl p-5 border border-gray-200 dark:border-gray-700">
      <h3 className="text-sm font-semibold text-gray-900 dark:text-white mb-4">Monthly by Category</h3>
      <div className="space-y-3">
        {cats.map(([cat, val]) => (
          <div key={cat}>
            <div className="flex justify-between text-sm mb-1">
              <span className="text-gray-700 dark:text-gray-300 flex items-center gap-2">
                <span className="w-3 h-3 rounded-full inline-block" style={{ backgroundColor: CATEGORY_COLORS[cat] || '#6b7280' }} />
                {cat}
              </span>
              <span className="font-medium text-gray-900 dark:text-white">{formatCurrency(val, currency)}</span>
            </div>
            <div className="h-2 bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden">
              <div className="h-full rounded-full transition-all duration-500"
                style={{ width: `${(val / max) * 100}%`, backgroundColor: CATEGORY_COLORS[cat] || '#6b7280' }} />
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ---- Subscription Row ----
function SubRow({ sub, currency, onEdit, onDelete, onToggle }) {
  const next = getNextRenewal(sub.startDate, sub.cycle);
  const days = daysUntil(next);
  const urgent = days <= 3 && days >= 0;
  const soon = days <= 7 && days > 3;
  const inactive = sub.active === false;

  return (
    <div className={`flex items-center gap-3 p-4 rounded-xl border transition-all fade-in ${
      inactive ? 'bg-gray-50 dark:bg-gray-800/50 border-gray-200 dark:border-gray-700 opacity-60' :
      urgent ? 'bg-red-50 dark:bg-red-900/20 border-red-200 dark:border-red-800' :
      soon ? 'bg-amber-50 dark:bg-amber-900/20 border-amber-200 dark:border-amber-800' :
      'bg-white dark:bg-gray-800 border-gray-200 dark:border-gray-700 hover:border-gray-300 dark:hover:border-gray-600'
    }`}>
      <div className="w-3 h-8 rounded-full flex-shrink-0" style={{ backgroundColor: CATEGORY_COLORS[sub.category] || '#6b7280' }} />
      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-2">
          <span className={`font-medium truncate ${inactive ? 'line-through text-gray-400 dark:text-gray-500' : 'text-gray-900 dark:text-white'}`}>
            {sub.name}
          </span>
          <span className="text-xs px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400 flex-shrink-0">
            {sub.category}
          </span>
        </div>
        <div className="flex items-center gap-3 text-sm text-gray-500 dark:text-gray-400 mt-0.5">
          <span>{formatCurrency(sub.cost, currency)} / {sub.cycle}</span>
          {!inactive && next && (
            <span className={`flex items-center gap-1 ${urgent ? 'text-red-600 dark:text-red-400 font-medium' : soon ? 'text-amber-600 dark:text-amber-400' : ''}`}>
              {urgent && <Icon name="alert" size={14} />}
              {days === 0 ? 'Renews today' : days === 1 ? 'Tomorrow' : days < 0 ? 'Overdue' : `${days}d`}
            </span>
          )}
          {sub.notes && <span className="truncate hidden sm:inline">{sub.notes}</span>}
        </div>
      </div>
      <div className="flex items-center gap-1 flex-shrink-0">
        <button onClick={() => onToggle(sub.id)} title={inactive ? 'Reactivate' : 'Pause'}
          className={`p-1.5 rounded-lg transition-colors ${inactive ? 'hover:bg-green-100 dark:hover:bg-green-900/30 text-green-600' : 'hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-400'}`}>
          <Icon name={inactive ? 'check' : 'calendar'} size={16} />
        </button>
        <button onClick={() => onEdit(sub)} title="Edit"
          className="p-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-400 transition-colors">
          <Icon name="edit" size={16} />
        </button>
        <button onClick={() => onDelete(sub.id)} title="Delete"
          className="p-1.5 rounded-lg hover:bg-red-100 dark:hover:bg-red-900/30 text-gray-400 hover:text-red-600 transition-colors">
          <Icon name="trash" size={16} />
        </button>
      </div>
    </div>
  );
}

// ---- Empty State ----
function EmptyState({ onAdd }) {
  return (
    <div className="text-center py-16">
      <div className="w-16 h-16 mx-auto mb-4 rounded-2xl bg-brand-50 dark:bg-brand-900/20 flex items-center justify-center">
        <Icon name="dollar" size={32} className="text-brand-500" />
      </div>
      <h3 className="text-lg font-semibold text-gray-900 dark:text-white mb-2">No subscriptions yet</h3>
      <p className="text-gray-500 dark:text-gray-400 mb-6 max-w-sm mx-auto">
        Start tracking your recurring payments. Add your first subscription to see your spending breakdown.
      </p>
      <button onClick={onAdd}
        className="inline-flex items-center gap-2 px-5 py-2.5 bg-brand-600 hover:bg-brand-700 text-white rounded-lg font-medium transition-colors">
        <Icon name="plus" size={18} /> Add Your First Subscription
      </button>
    </div>
  );
}

// ---- Main App ----
function App() {
  const [subs, setSubs] = useState(loadSubs);
  const [settings, setSettings] = useState(loadSettings);
  const [modalOpen, setModalOpen] = useState(false);
  const [editing, setEditing] = useState(null);
  const [search, setSearch] = useState('');
  const [filterCat, setFilterCat] = useState('All');
  const [sortBy, setSortBy] = useState('renewal'); // renewal, cost, name
  const [showInactive, setShowInactive] = useState(true);
  const [confirmDelete, setConfirmDelete] = useState(null);

  useEffect(() => { saveSubs(subs); }, [subs]);
  useEffect(() => {
    saveSettings(settings);
    document.documentElement.classList.toggle('dark', settings.dark);
  }, [settings]);

  const currency = settings.currency || 'USD';

  const handleSave = useCallback((sub) => {
    setSubs(prev => {
      const idx = prev.findIndex(s => s.id === sub.id);
      if (idx >= 0) { const next = [...prev]; next[idx] = sub; return next; }
      return [...prev, sub];
    });
    setModalOpen(false);
    setEditing(null);
  }, []);

  const handleDelete = useCallback((id) => {
    setSubs(prev => prev.filter(s => s.id !== id));
    setConfirmDelete(null);
  }, []);

  const handleToggle = useCallback((id) => {
    setSubs(prev => prev.map(s => s.id === id ? { ...s, active: s.active === false ? true : false } : s));
  }, []);

  const handleExportCSV = useCallback(() => {
    const headers = ['Name', 'Cost', 'Cycle', 'Category', 'Start Date', 'Active', 'Notes', 'Monthly Cost', 'Annual Cost'];
    const rows = subs.map(s => [
      s.name, s.cost, s.cycle, s.category, s.startDate,
      s.active !== false ? 'Yes' : 'No', s.notes || '',
      monthlyCost(s.cost, s.cycle).toFixed(2), annualCost(s.cost, s.cycle).toFixed(2)
    ]);
    const csv = [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `subtrack-export-${new Date().toISOString().slice(0,10)}.csv`;
    a.click(); URL.revokeObjectURL(url);
  }, [subs]);

  const handleExportJSON = useCallback(() => {
    const blob = new Blob([JSON.stringify({ version: 1, exported: new Date().toISOString(), subscriptions: subs }, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `subtrack-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click(); URL.revokeObjectURL(url);
  }, [subs]);

  const handleImportJSON = useCallback((e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        const imported = data.subscriptions || data;
        if (!Array.isArray(imported)) { alert('Invalid backup file.'); return; }
        const cleaned = imported.map(s => ({ ...s, id: s.id || genId() }));
        if (confirm(`Import ${cleaned.length} subscriptions? This will replace your current data.`)) {
          setSubs(cleaned);
        }
      } catch { alert('Could not parse the file. Make sure it is a SubTrack JSON backup.'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  }, []);

  // Computed
  const activeSubs = useMemo(() => subs.filter(s => s.active !== false), [subs]);
  const totalMonthly = useMemo(() => activeSubs.reduce((sum, s) => sum + monthlyCost(s.cost, s.cycle), 0), [activeSubs]);
  const totalAnnual = useMemo(() => activeSubs.reduce((sum, s) => sum + annualCost(s.cost, s.cycle), 0), [activeSubs]);
  const upcomingCount = useMemo(() => activeSubs.filter(s => daysUntil(getNextRenewal(s.startDate, s.cycle)) <= 7).length, [activeSubs]);

  const usedCategories = useMemo(() => {
    const cats = new Set(subs.map(s => s.category));
    return ['All', ...CATEGORIES.filter(c => cats.has(c))];
  }, [subs]);

  const filteredSubs = useMemo(() => {
    let list = [...subs];
    if (!showInactive) list = list.filter(s => s.active !== false);
    if (filterCat !== 'All') list = list.filter(s => s.category === filterCat);
    if (search) {
      const q = search.toLowerCase();
      list = list.filter(s => s.name.toLowerCase().includes(q) || (s.notes || '').toLowerCase().includes(q));
    }
    list.sort((a, b) => {
      if (sortBy === 'renewal') {
        const da = daysUntil(getNextRenewal(a.startDate, a.cycle));
        const db = daysUntil(getNextRenewal(b.startDate, b.cycle));
        if (a.active === false && b.active !== false) return 1;
        if (a.active !== false && b.active === false) return -1;
        return da - db;
      }
      if (sortBy === 'cost') return monthlyCost(b.cost, b.cycle) - monthlyCost(a.cost, a.cycle);
      return a.name.localeCompare(b.name);
    });
    return list;
  }, [subs, search, filterCat, sortBy, showInactive]);

  const fileInputRef = useRef(null);

  return (
    <div className="min-h-screen bg-gray-50 dark:bg-gray-900 transition-colors">
      {/* Header */}
      <header className="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 sticky top-0 z-40">
        <div className="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-2">
            <div className="w-8 h-8 rounded-lg bg-brand-600 flex items-center justify-center">
              <Icon name="dollar" size={18} className="text-white" />
            </div>
            <h1 className="text-lg font-bold text-gray-900 dark:text-white">SubTrack<span className="text-brand-600">Lite</span></h1>
          </div>
          <div className="flex items-center gap-2">
            <select value={currency} onChange={e => setSettings(s => ({ ...s, currency: e.target.value }))}
              className="text-sm px-2 py-1.5 rounded-lg border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-700 dark:text-gray-300 outline-none">
              {['USD', 'EUR', 'GBP', 'CAD', 'AUD', 'JPY', 'INR', 'BRL'].map(c => <option key={c} value={c}>{c}</option>)}
            </select>
            <button onClick={() => setSettings(s => ({ ...s, dark: !s.dark }))}
              className="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-500 dark:text-gray-400 transition-colors">
              <Icon name={settings.dark ? 'sun' : 'moon'} size={18} />
            </button>
          </div>
        </div>
      </header>

      <main className="max-w-4xl mx-auto px-4 py-6 space-y-6">
        {/* Stats */}
        {subs.length > 0 && (
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
            <StatCard label="Monthly" value={formatCurrency(totalMonthly, currency)} />
            <StatCard label="Annual" value={formatCurrency(totalAnnual, currency)} />
            <StatCard label="Active" value={activeSubs.length} sub={`of ${subs.length} total`} />
            <StatCard label="Due in 7 days" value={upcomingCount}
              sub={upcomingCount > 0 ? 'Check renewals' : 'All clear'} />
          </div>
        )}

        {/* Category Chart */}
        {activeSubs.length > 0 && <CategoryChart subs={subs} currency={currency} />}

        {/* Toolbar */}
        {subs.length > 0 && (
          <div className="flex flex-wrap items-center gap-2">
            <div className="relative flex-1 min-w-[200px]">
              <Icon name="search" size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />
              <input type="text" value={search} onChange={e => setSearch(e.target.value)}
                placeholder="Search subscriptions..."
                className="w-full pl-9 pr-3 py-2 rounded-lg border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white text-sm outline-none focus:ring-2 focus:ring-brand-500" />
            </div>
            <select value={filterCat} onChange={e => setFilterCat(e.target.value)}
              className="text-sm px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-700 dark:text-gray-300 outline-none">
              {usedCategories.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
            <select value={sortBy} onChange={e => setSortBy(e.target.value)}
              className="text-sm px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-700 dark:text-gray-300 outline-none">
              <option value="renewal">By renewal</option>
              <option value="cost">By cost</option>
              <option value="name">By name</option>
            </select>
            <label className="flex items-center gap-1.5 text-sm text-gray-500 dark:text-gray-400 cursor-pointer select-none">
              <input type="checkbox" checked={showInactive} onChange={e => setShowInactive(e.target.checked)}
                className="w-3.5 h-3.5 rounded border-gray-300 text-brand-600" />
              Paused
            </label>
          </div>
        )}

        {/* Subscription List */}
        {subs.length === 0 ? (
          <EmptyState onAdd={() => setModalOpen(true)} />
        ) : (
          <div className="space-y-2">
            {filteredSubs.map(sub => (
              <SubRow key={sub.id} sub={sub} currency={currency}
                onEdit={(s) => { setEditing(s); setModalOpen(true); }}
                onDelete={(id) => setConfirmDelete(id)}
                onToggle={handleToggle} />
            ))}
            {filteredSubs.length === 0 && (
              <div className="text-center py-8 text-gray-400 dark:text-gray-500">No subscriptions match your filters.</div>
            )}
          </div>
        )}

        {/* Actions Bar */}
        <div className="flex flex-wrap items-center justify-between gap-3 pt-4 border-t border-gray-200 dark:border-gray-700">
          <button onClick={() => { setEditing(null); setModalOpen(true); }}
            className="inline-flex items-center gap-2 px-4 py-2.5 bg-brand-600 hover:bg-brand-700 text-white rounded-lg font-medium transition-colors text-sm">
            <Icon name="plus" size={16} /> Add Subscription
          </button>
          <div className="flex items-center gap-2">
            <button onClick={handleExportCSV} disabled={subs.length === 0}
              className="inline-flex items-center gap-1.5 px-3 py-2 text-sm text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors disabled:opacity-40">
              <Icon name="download" size={14} /> CSV
            </button>
            <button onClick={handleExportJSON} disabled={subs.length === 0}
              className="inline-flex items-center gap-1.5 px-3 py-2 text-sm text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors disabled:opacity-40">
              <Icon name="download" size={14} /> Backup
            </button>
            <button onClick={() => fileInputRef.current?.click()}
              className="inline-flex items-center gap-1.5 px-3 py-2 text-sm text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors">
              <Icon name="upload" size={14} /> Import
            </button>
            <input ref={fileInputRef} type="file" accept=".json" onChange={handleImportJSON} className="hidden" />
          </div>
        </div>

        {/* Footer */}
        <footer className="text-center text-xs text-gray-400 dark:text-gray-600 py-4">
          SubTrack Lite - Your data stays in your browser. No accounts, no ads, no tracking.
        </footer>
      </main>

      {/* Add/Edit Modal */}
      <Modal open={modalOpen} onClose={() => { setModalOpen(false); setEditing(null); }}
        title={editing ? 'Edit Subscription' : 'Add Subscription'}>
        <SubForm sub={editing} onSave={handleSave} onCancel={() => { setModalOpen(false); setEditing(null); }} />
      </Modal>

      {/* Delete Confirmation */}
      <Modal open={!!confirmDelete} onClose={() => setConfirmDelete(null)} title="Delete Subscription">
        <p className="text-gray-600 dark:text-gray-300 mb-4">
          Remove <strong>{subs.find(s => s.id === confirmDelete)?.name}</strong>? This cannot be undone.
        </p>
        <div className="flex gap-2">
          <button onClick={() => handleDelete(confirmDelete)}
            className="flex-1 px-4 py-2.5 bg-red-600 hover:bg-red-700 text-white rounded-lg font-medium transition-colors">
            Delete
          </button>
          <button onClick={() => setConfirmDelete(null)}
            className="flex-1 px-4 py-2.5 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 rounded-lg font-medium transition-colors">
            Cancel
          </button>
        </div>
      </Modal>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>

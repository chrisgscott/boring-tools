<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HabitFlow - Daily Habit Tracker</title>
<meta name="description" content="Track your daily habits without ads, accounts, or bloat. Your data stays in your browser.">
<meta property="og:title" content="HabitFlow - Daily Habit Tracker">
<meta property="og:description" content="Track your daily habits without ads, accounts, or bloat. Free forever.">
<meta property="og:type" content="website">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#10b981">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<script>if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }</script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        brand: { 50: '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0', 300: '#6ee7b7', 400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857', 800: '#065f46', 900: '#064e3b' }
      }
    }
  }
}
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  body { font-family: 'Inter', system-ui, sans-serif; }
  .fade-in { animation: fadeIn 0.2s ease-in; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .modal-overlay { animation: overlayIn 0.15s ease-out; }
  @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
  .check-pop { animation: checkPop 0.3s ease-out; }
  @keyframes checkPop { 0% { transform: scale(0.7); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
  .streak-glow { animation: streakGlow 0.5s ease-out; }
  @keyframes streakGlow { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 100% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

// ---- Data layer ----
const HABITS_KEY = 'habitflow-habits';
const LOG_KEY = 'habitflow-log';
const SETTINGS_KEY = 'habitflow-settings';

const COLORS = ['#10b981','#3b82f6','#ef4444','#a855f7','#f97316','#ec4899','#14b8a6','#eab308','#6366f1','#64748b'];
const ICONS = ['check','star','heart','bolt','fire','book','run','water','sleep','music'];
const ICON_MAP = { check:'\u2705', star:'\u2B50', heart:'\u2764\uFE0F', bolt:'\u26A1', fire:'\uD83D\uDD25', book:'\uD83D\uDCDA', run:'\uD83C\uDFC3', water:'\uD83D\uDCA7', sleep:'\uD83D\uDE34', music:'\uD83C\uDFB5' };
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const FREQ_OPTIONS = [
  { value: 'daily', label: 'Every day' },
  { value: 'weekdays', label: 'Weekdays only' },
  { value: 'weekends', label: 'Weekends only' },
  { value: 'custom', label: 'Custom days' },
];

function load(key, fallback) {
  try { return JSON.parse(localStorage.getItem(key)) || fallback; }
  catch { return fallback; }
}
function save(key, data) { localStorage.setItem(key, JSON.stringify(data)); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function dateKey(d) { return d ? new Date(d).toISOString().slice(0,10) : new Date().toISOString().slice(0,10); }
function today() { return dateKey(new Date()); }
function formatDate(s) { const d = new Date(s + 'T12:00:00'); return d.toLocaleDateString(undefined, { weekday:'short', month:'short', day:'numeric' }); }
function daysAgo(n) { const d = new Date(); d.setDate(d.getDate() - n); return dateKey(d); }
function dayOfWeek(dateStr) { return new Date(dateStr + 'T12:00:00').getDay(); }

function isDueOn(habit, dateStr) {
  const dow = dayOfWeek(dateStr);
  if (habit.frequency === 'daily') return true;
  if (habit.frequency === 'weekdays') return dow >= 1 && dow <= 5;
  if (habit.frequency === 'weekends') return dow === 0 || dow === 6;
  if (habit.frequency === 'custom') return (habit.customDays || []).includes(dow);
  return true;
}

function getStreak(habit, log) {
  let streak = 0;
  let d = new Date();
  // Check if today is due and not yet done - if so start from yesterday
  const todayStr = dateKey(d);
  const todayDue = isDueOn(habit, todayStr);
  const todayDone = log[todayStr] && log[todayStr][habit.id];
  if (todayDue && todayDone) {
    streak = 1;
    d.setDate(d.getDate() - 1);
  } else if (todayDue && !todayDone) {
    // Today is due but not done yet - count from yesterday
    d.setDate(d.getDate() - 1);
  } else {
    // Today not due - count from yesterday
    d.setDate(d.getDate() - 1);
  }
  for (let i = 0; i < 365; i++) {
    const dk = dateKey(d);
    const due = isDueOn(habit, dk);
    if (due) {
      if (log[dk] && log[dk][habit.id]) {
        streak++;
      } else {
        break;
      }
    }
    d.setDate(d.getDate() - 1);
  }
  return streak;
}

function getBestStreak(habit, log) {
  let best = 0, current = 0;
  const d = new Date();
  d.setDate(d.getDate() - 364);
  for (let i = 0; i < 365; i++) {
    const dk = dateKey(d);
    if (isDueOn(habit, dk)) {
      if (log[dk] && log[dk][habit.id]) {
        current++;
        if (current > best) best = current;
      } else {
        current = 0;
      }
    }
    d.setDate(d.getDate() + 1);
  }
  return best;
}

function getCompletionRate(habit, log, days) {
  let due = 0, done = 0;
  for (let i = 0; i < days; i++) {
    const dk = daysAgo(i);
    if (isDueOn(habit, dk)) {
      due++;
      if (log[dk] && log[dk][habit.id]) done++;
    }
  }
  return due === 0 ? 0 : Math.round((done / due) * 100);
}

// ---- Components ----

function Modal({ open, onClose, title, children }) {
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay" onClick={onClose}>
      <div className="absolute inset-0 bg-black/50" />
      <div className="relative bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-md max-h-[90vh] overflow-y-auto fade-in" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between p-4 border-b dark:border-gray-700">
          <h2 className="text-lg font-semibold dark:text-white">{title}</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 text-xl leading-none">&times;</button>
        </div>
        <div className="p-4">{children}</div>
      </div>
    </div>
  );
}

function HabitForm({ habit, onSave, onCancel }) {
  const [name, setName] = useState(habit?.name || '');
  const [color, setColor] = useState(habit?.color || COLORS[0]);
  const [icon, setIcon] = useState(habit?.icon || 'check');
  const [frequency, setFrequency] = useState(habit?.frequency || 'daily');
  const [customDays, setCustomDays] = useState(habit?.customDays || [1,2,3,4,5]);

  const toggleDay = (d) => {
    setCustomDays(prev => prev.includes(d) ? prev.filter(x => x !== d) : [...prev, d].sort());
  };

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!name.trim()) return;
    onSave({ id: habit?.id || genId(), name: name.trim(), color, icon, frequency, customDays, createdAt: habit?.createdAt || new Date().toISOString(), paused: habit?.paused || false });
  };

  return (
    <form onSubmit={handleSubmit} className="space-y-4">
      <div>
        <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Habit name</label>
        <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Read 20 minutes" className="w-full px-3 py-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:ring-2 focus:ring-brand-500 focus:border-brand-500" autoFocus />
      </div>
      <div>
        <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Icon</label>
        <div className="flex gap-2 flex-wrap">
          {ICONS.map(ic => (
            <button key={ic} type="button" onClick={() => setIcon(ic)}
              className={`w-10 h-10 rounded-lg flex items-center justify-center text-lg transition-all ${icon === ic ? 'ring-2 ring-brand-500 bg-brand-50 dark:bg-brand-900/30' : 'bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600'}`}>
              {ICON_MAP[ic]}
            </button>
          ))}
        </div>
      </div>
      <div>
        <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Color</label>
        <div className="flex gap-2 flex-wrap">
          {COLORS.map(c => (
            <button key={c} type="button" onClick={() => setColor(c)}
              className={`w-8 h-8 rounded-full transition-all ${color === c ? 'ring-2 ring-offset-2 ring-gray-400 dark:ring-offset-gray-800' : 'hover:scale-110'}`}
              style={{ backgroundColor: c }} />
          ))}
        </div>
      </div>
      <div>
        <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Frequency</label>
        <select value={frequency} onChange={e => setFrequency(e.target.value)} className="w-full px-3 py-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600 dark:text-white">
          {FREQ_OPTIONS.map(f => <option key={f.value} value={f.value}>{f.label}</option>)}
        </select>
      </div>
      {frequency === 'custom' && (
        <div>
          <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Select days</label>
          <div className="flex gap-1">
            {DAYS.map((d, i) => (
              <button key={i} type="button" onClick={() => toggleDay(i)}
                className={`flex-1 py-2 rounded-lg text-xs font-medium transition-all ${customDays.includes(i) ? 'bg-brand-500 text-white' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400'}`}>
                {d}
              </button>
            ))}
          </div>
        </div>
      )}
      <div className="flex gap-2 pt-2">
        <button type="button" onClick={onCancel} className="flex-1 px-4 py-2 border rounded-lg text-gray-700 dark:text-gray-300 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700">Cancel</button>
        <button type="submit" disabled={!name.trim()} className="flex-1 px-4 py-2 bg-brand-500 text-white rounded-lg hover:bg-brand-600 disabled:opacity-50 disabled:cursor-not-allowed font-medium">Save</button>
      </div>
    </form>
  );
}

function TodayView({ habits, log, onToggle, onEdit }) {
  const todayStr = today();
  const dueHabits = habits.filter(h => !h.paused && isDueOn(h, todayStr));
  const doneCount = dueHabits.filter(h => log[todayStr] && log[todayStr][h.id]).length;
  const pct = dueHabits.length === 0 ? 0 : Math.round((doneCount / dueHabits.length) * 100);

  return (
    <div className="fade-in">
      <div className="mb-6">
        <div className="flex items-center justify-between mb-2">
          <span className="text-sm font-medium text-gray-600 dark:text-gray-400">{doneCount} of {dueHabits.length} done</span>
          <span className="text-sm font-semibold" style={{ color: pct === 100 ? '#10b981' : pct >= 50 ? '#f59e0b' : '#6b7280' }}>{pct}%</span>
        </div>
        <div className="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-3 overflow-hidden">
          <div className="h-full rounded-full transition-all duration-500 ease-out" style={{ width: `${pct}%`, backgroundColor: pct === 100 ? '#10b981' : pct >= 50 ? '#f59e0b' : '#d1d5db' }} />
        </div>
        {pct === 100 && dueHabits.length > 0 && (
          <p className="text-center text-brand-600 dark:text-brand-400 font-semibold mt-2 text-sm">All done for today!</p>
        )}
      </div>

      {dueHabits.length === 0 ? (
        <div className="text-center py-12 text-gray-400 dark:text-gray-500">
          <p className="text-4xl mb-2">{'\uD83C\uDFD6\uFE0F'}</p>
          <p>No habits due today. Enjoy the break!</p>
        </div>
      ) : (
        <div className="space-y-2">
          {dueHabits.map(h => {
            const done = log[todayStr] && log[todayStr][h.id];
            const streak = getStreak(h, log);
            return (
              <div key={h.id} className={`flex items-center gap-3 p-3 rounded-xl transition-all cursor-pointer ${done ? 'bg-brand-50 dark:bg-brand-900/20' : 'bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-750'} border ${done ? 'border-brand-200 dark:border-brand-800' : 'border-gray-200 dark:border-gray-700'}`}
                onClick={() => onToggle(h.id)}>
                <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-lg flex-shrink-0 transition-all ${done ? 'check-pop' : ''}`}
                  style={{ backgroundColor: done ? h.color + '20' : h.color + '15' }}>
                  {done ? <span className="text-xl">{'\u2714\uFE0F'}</span> : <span>{ICON_MAP[h.icon]}</span>}
                </div>
                <div className="flex-1 min-w-0">
                  <p className={`font-medium truncate ${done ? 'text-gray-400 dark:text-gray-500 line-through' : 'text-gray-900 dark:text-white'}`}>{h.name}</p>
                  {streak > 0 && (
                    <p className="text-xs text-brand-600 dark:text-brand-400 font-medium">{'\uD83D\uDD25'} {streak} day streak</p>
                  )}
                </div>
                <button onClick={e => { e.stopPropagation(); onEdit(h); }} className="p-1 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"/></svg>
                </button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function StatsView({ habits, log }) {
  const activeHabits = habits.filter(h => !h.paused);
  if (activeHabits.length === 0) {
    return <div className="text-center py-12 text-gray-400 dark:text-gray-500"><p>Add some habits to see stats.</p></div>;
  }

  return (
    <div className="fade-in space-y-4">
      {activeHabits.map(h => {
        const streak = getStreak(h, log);
        const best = getBestStreak(h, log);
        const rate7 = getCompletionRate(h, log, 7);
        const rate30 = getCompletionRate(h, log, 30);
        return (
          <div key={h.id} className="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4">
            <div className="flex items-center gap-3 mb-3">
              <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{ backgroundColor: h.color + '20' }}>
                <span>{ICON_MAP[h.icon]}</span>
              </div>
              <h3 className="font-semibold text-gray-900 dark:text-white">{h.name}</h3>
            </div>
            <div className="grid grid-cols-4 gap-2 text-center">
              <div className="bg-gray-50 dark:bg-gray-700/50 rounded-lg p-2">
                <p className="text-lg font-bold" style={{ color: h.color }}>{streak}</p>
                <p className="text-xs text-gray-500 dark:text-gray-400">Current</p>
              </div>
              <div className="bg-gray-50 dark:bg-gray-700/50 rounded-lg p-2">
                <p className="text-lg font-bold text-gray-700 dark:text-gray-300">{best}</p>
                <p className="text-xs text-gray-500 dark:text-gray-400">Best</p>
              </div>
              <div className="bg-gray-50 dark:bg-gray-700/50 rounded-lg p-2">
                <p className="text-lg font-bold" style={{ color: rate7 >= 80 ? '#10b981' : rate7 >= 50 ? '#f59e0b' : '#ef4444' }}>{rate7}%</p>
                <p className="text-xs text-gray-500 dark:text-gray-400">7 days</p>
              </div>
              <div className="bg-gray-50 dark:bg-gray-700/50 rounded-lg p-2">
                <p className="text-lg font-bold" style={{ color: rate30 >= 80 ? '#10b981' : rate30 >= 50 ? '#f59e0b' : '#ef4444' }}>{rate30}%</p>
                <p className="text-xs text-gray-500 dark:text-gray-400">30 days</p>
              </div>
            </div>
            {/* Mini heatmap - last 28 days */}
            <div className="mt-3">
              <div className="grid grid-cols-7 gap-1">
                {Array.from({ length: 28 }, (_, i) => {
                  const dk = daysAgo(27 - i);
                  const due = isDueOn(h, dk);
                  const done = log[dk] && log[dk][h.id];
                  return (
                    <div key={i} title={formatDate(dk)}
                      className="aspect-square rounded-sm transition-all"
                      style={{
                        backgroundColor: !due ? 'transparent' : done ? h.color : (document.documentElement.classList.contains('dark') ? '#374151' : '#e5e7eb'),
                        opacity: done ? 1 : 0.5,
                        border: !due ? '1px dashed #d1d5db' : 'none',
                      }} />
                  );
                })}
              </div>
              <div className="flex justify-between mt-1">
                <span className="text-xs text-gray-400">{formatDate(daysAgo(27))}</span>
                <span className="text-xs text-gray-400">Today</span>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function CalendarView({ habits, log }) {
  const [monthOffset, setMonthOffset] = useState(0);
  const now = new Date();
  const viewMonth = new Date(now.getFullYear(), now.getMonth() + monthOffset, 1);
  const year = viewMonth.getFullYear();
  const month = viewMonth.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const monthName = viewMonth.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });

  const activeHabits = habits.filter(h => !h.paused);

  return (
    <div className="fade-in">
      <div className="flex items-center justify-between mb-4">
        <button onClick={() => setMonthOffset(m => m - 1)} className="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-400">&larr;</button>
        <h3 className="font-semibold text-gray-900 dark:text-white">{monthName}</h3>
        <button onClick={() => setMonthOffset(m => Math.min(m + 1, 0))} disabled={monthOffset >= 0} className="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-400 disabled:opacity-30">&rarr;</button>
      </div>
      <div className="grid grid-cols-7 gap-1 mb-1">
        {DAYS.map(d => <div key={d} className="text-center text-xs font-medium text-gray-400 py-1">{d}</div>)}
      </div>
      <div className="grid grid-cols-7 gap-1">
        {Array.from({ length: firstDay }, (_, i) => <div key={'e' + i} />)}
        {Array.from({ length: daysInMonth }, (_, i) => {
          const day = i + 1;
          const dk = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
          const isToday = dk === today();
          let dueCount = 0, doneCount = 0;
          activeHabits.forEach(h => {
            if (isDueOn(h, dk)) {
              dueCount++;
              if (log[dk] && log[dk][h.id]) doneCount++;
            }
          });
          const pct = dueCount === 0 ? -1 : Math.round((doneCount / dueCount) * 100);
          let bg = '';
          if (pct === 100) bg = 'bg-brand-500 text-white';
          else if (pct >= 50) bg = 'bg-brand-200 dark:bg-brand-800 text-brand-800 dark:text-brand-200';
          else if (pct > 0) bg = 'bg-brand-100 dark:bg-brand-900/40 text-brand-700 dark:text-brand-300';
          else if (pct === 0 && dueCount > 0) bg = 'bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400';
          else bg = 'text-gray-400 dark:text-gray-500';

          return (
            <div key={day} className={`aspect-square flex items-center justify-center rounded-lg text-sm font-medium ${bg} ${isToday ? 'ring-2 ring-brand-500 ring-offset-1 dark:ring-offset-gray-900' : ''}`}
              title={dueCount > 0 ? `${doneCount}/${dueCount} done` : 'No habits due'}>
              {day}
            </div>
          );
        })}
      </div>
      <div className="flex items-center justify-center gap-4 mt-4 text-xs text-gray-500 dark:text-gray-400">
        <span className="flex items-center gap-1"><span className="w-3 h-3 rounded-sm bg-brand-500 inline-block" /> 100%</span>
        <span className="flex items-center gap-1"><span className="w-3 h-3 rounded-sm bg-brand-200 dark:bg-brand-800 inline-block" /> 50%+</span>
        <span className="flex items-center gap-1"><span className="w-3 h-3 rounded-sm bg-brand-100 dark:bg-brand-900/40 inline-block" /> &lt;50%</span>
        <span className="flex items-center gap-1"><span className="w-3 h-3 rounded-sm bg-gray-100 dark:bg-gray-700 inline-block" /> 0%</span>
      </div>
    </div>
  );
}

function ManageView({ habits, onEdit, onDelete, onTogglePause, onReorder }) {
  if (habits.length === 0) {
    return <div className="text-center py-12 text-gray-400 dark:text-gray-500"><p>No habits yet. Add one to get started!</p></div>;
  }
  return (
    <div className="fade-in space-y-2">
      {habits.map((h, idx) => (
        <div key={h.id} className={`flex items-center gap-3 p-3 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl ${h.paused ? 'opacity-50' : ''}`}>
          <div className="flex flex-col gap-1">
            <button disabled={idx === 0} onClick={() => onReorder(idx, idx - 1)} className="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 disabled:opacity-20 text-xs">{'\u25B2'}</button>
            <button disabled={idx === habits.length - 1} onClick={() => onReorder(idx, idx + 1)} className="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 disabled:opacity-20 text-xs">{'\u25BC'}</button>
          </div>
          <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{ backgroundColor: h.color + '20' }}>
            <span>{ICON_MAP[h.icon]}</span>
          </div>
          <div className="flex-1 min-w-0">
            <p className="font-medium text-gray-900 dark:text-white truncate">{h.name}</p>
            <p className="text-xs text-gray-500 dark:text-gray-400">
              {FREQ_OPTIONS.find(f => f.value === h.frequency)?.label}
              {h.paused && ' (paused)'}
            </p>
          </div>
          <div className="flex gap-1">
            <button onClick={() => onTogglePause(h.id)} className="p-1.5 rounded-lg text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700" title={h.paused ? 'Resume' : 'Pause'}>
              {h.paused ? '\u25B6\uFE0F' : '\u23F8\uFE0F'}
            </button>
            <button onClick={() => onEdit(h)} className="p-1.5 rounded-lg text-gray-400 hover:text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/20" title="Edit">
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
            </button>
            <button onClick={() => onDelete(h.id)} className="p-1.5 rounded-lg text-gray-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20" title="Delete">
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </button>
          </div>
        </div>
      ))}
    </div>
  );
}

function SettingsView({ onExport, onImport }) {
  const fileRef = React.useRef();
  return (
    <div className="fade-in space-y-4">
      <div className="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4">
        <h3 className="font-semibold text-gray-900 dark:text-white mb-3">Data</h3>
        <div className="space-y-2">
          <button onClick={onExport} className="w-full px-4 py-2 bg-brand-500 text-white rounded-lg hover:bg-brand-600 font-medium">Export JSON backup</button>
          <button onClick={() => fileRef.current.click()} className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 font-medium">Import JSON backup</button>
          <input ref={fileRef} type="file" accept=".json" className="hidden" onChange={e => { const f = e.target.files[0]; if (f) { const r = new FileReader(); r.onload = () => onImport(r.result); r.readAsText(f); } }} />
        </div>
      </div>
      <div className="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4">
        <h3 className="font-semibold text-gray-900 dark:text-white mb-2">About</h3>
        <p className="text-sm text-gray-600 dark:text-gray-400">HabitFlow is a zero-infrastructure habit tracker. No accounts, no server, no ads. Your data lives in your browser's localStorage and never leaves your device.</p>
        <p className="text-sm text-gray-500 dark:text-gray-500 mt-2">Install this app to your home screen for offline access.</p>
      </div>
    </div>
  );
}

// ---- Main App ----
function App() {
  const [habits, setHabits] = useState(() => load(HABITS_KEY, []));
  const [log, setLog] = useState(() => load(LOG_KEY, {}));
  const [settings, setSettings] = useState(() => load(SETTINGS_KEY, { dark: false }));
  const [tab, setTab] = useState('today');
  const [showForm, setShowForm] = useState(false);
  const [editHabit, setEditHabit] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);

  useEffect(() => { save(HABITS_KEY, habits); }, [habits]);
  useEffect(() => { save(LOG_KEY, log); }, [log]);
  useEffect(() => {
    save(SETTINGS_KEY, settings);
    document.documentElement.classList.toggle('dark', settings.dark);
  }, [settings]);

  const toggleDark = () => setSettings(s => ({ ...s, dark: !s.dark }));

  const toggleHabit = useCallback((habitId) => {
    const dk = today();
    setLog(prev => {
      const dayLog = { ...(prev[dk] || {}) };
      if (dayLog[habitId]) {
        delete dayLog[habitId];
      } else {
        dayLog[habitId] = new Date().toISOString();
      }
      return { ...prev, [dk]: dayLog };
    });
  }, []);

  const saveHabit = (h) => {
    setHabits(prev => {
      const idx = prev.findIndex(x => x.id === h.id);
      if (idx >= 0) { const copy = [...prev]; copy[idx] = h; return copy; }
      return [...prev, h];
    });
    setShowForm(false);
    setEditHabit(null);
  };

  const deleteHabit = (id) => {
    setHabits(prev => prev.filter(h => h.id !== id));
    setConfirmDelete(null);
  };

  const togglePause = (id) => {
    setHabits(prev => prev.map(h => h.id === id ? { ...h, paused: !h.paused } : h));
  };

  const reorder = (from, to) => {
    setHabits(prev => {
      const copy = [...prev];
      const [item] = copy.splice(from, 1);
      copy.splice(to, 0, item);
      return copy;
    });
  };

  const handleExport = () => {
    const data = JSON.stringify({ habits, log, exportedAt: new Date().toISOString(), app: 'HabitFlow' }, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `habitflow-backup-${today()}.json`; a.click();
    URL.revokeObjectURL(url);
  };

  const handleImport = (text) => {
    try {
      const data = JSON.parse(text);
      if (data.habits && Array.isArray(data.habits)) {
        setHabits(data.habits);
        if (data.log) setLog(data.log);
        alert('Data imported successfully!');
      } else {
        alert('Invalid backup file format.');
      }
    } catch { alert('Could not parse backup file.'); }
  };

  const openEdit = (h) => { setEditHabit(h); setShowForm(true); };

  const TABS = [
    { id: 'today', label: 'Today', icon: '\u2600\uFE0F' },
    { id: 'stats', label: 'Stats', icon: '\uD83D\uDCCA' },
    { id: 'calendar', label: 'Calendar', icon: '\uD83D\uDCC5' },
    { id: 'manage', label: 'Manage', icon: '\u2699\uFE0F' },
  ];

  return (
    <div className="min-h-screen bg-gray-50 dark:bg-gray-900 transition-colors">
      {/* Header */}
      <header className="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 sticky top-0 z-40">
        <div className="max-w-lg mx-auto px-4 py-3 flex items-center justify-between">
          <h1 className="text-lg font-bold text-gray-900 dark:text-white">{'\u2705'} HabitFlow</h1>
          <div className="flex items-center gap-2">
            <button onClick={toggleDark} className="p-2 rounded-lg text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700" title="Toggle theme">
              {settings.dark ? '\u2600\uFE0F' : '\uD83C\uDF19'}
            </button>
            {tab === 'manage' && (
              <button onClick={() => setTab('settings')} className="p-2 rounded-lg text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700" title="Settings">
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
              </button>
            )}
          </div>
        </div>
      </header>

      {/* Content */}
      <main className="max-w-lg mx-auto px-4 py-4 pb-24">
        {tab === 'today' && <TodayView habits={habits} log={log} onToggle={toggleHabit} onEdit={openEdit} />}
        {tab === 'stats' && <StatsView habits={habits} log={log} />}
        {tab === 'calendar' && <CalendarView habits={habits} log={log} />}
        {tab === 'manage' && <ManageView habits={habits} onEdit={openEdit} onDelete={id => setConfirmDelete(id)} onTogglePause={togglePause} onReorder={reorder} />}
        {tab === 'settings' && <SettingsView onExport={handleExport} onImport={handleImport} />}
      </main>

      {/* FAB - add habit */}
      {(tab === 'today' || tab === 'manage') && (
        <button onClick={() => { setEditHabit(null); setShowForm(true); }}
          className="fixed bottom-20 right-4 w-14 h-14 bg-brand-500 hover:bg-brand-600 text-white rounded-full shadow-lg flex items-center justify-center text-2xl transition-transform hover:scale-105 z-30 max-w-lg"
          style={{ right: 'max(1rem, calc((100vw - 32rem) / 2 + 1rem))' }}>
          +
        </button>
      )}

      {/* Bottom nav */}
      <nav className="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 z-40">
        <div className="max-w-lg mx-auto flex">
          {TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              className={`flex-1 py-3 flex flex-col items-center gap-0.5 text-xs font-medium transition-colors ${tab === t.id ? 'text-brand-600 dark:text-brand-400' : 'text-gray-400 hover:text-gray-600 dark:hover:text-gray-300'}`}>
              <span className="text-lg">{t.icon}</span>
              {t.label}
            </button>
          ))}
        </div>
      </nav>

      {/* Add/Edit modal */}
      <Modal open={showForm} onClose={() => { setShowForm(false); setEditHabit(null); }} title={editHabit ? 'Edit Habit' : 'New Habit'}>
        <HabitForm habit={editHabit} onSave={saveHabit} onCancel={() => { setShowForm(false); setEditHabit(null); }} />
      </Modal>

      {/* Delete confirm */}
      <Modal open={!!confirmDelete} onClose={() => setConfirmDelete(null)} title="Delete Habit">
        <p className="text-gray-600 dark:text-gray-400 mb-4">This will delete the habit and all its history. This cannot be undone.</p>
        <div className="flex gap-2">
          <button onClick={() => setConfirmDelete(null)} className="flex-1 px-4 py-2 border rounded-lg text-gray-700 dark:text-gray-300 dark:border-gray-600">Cancel</button>
          <button onClick={() => deleteHabit(confirmDelete)} className="flex-1 px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 font-medium">Delete</button>
        </div>
      </Modal>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediTrack Simple - Medication Tracker</title>
<meta name="description" content="Track your medications without ads, accounts, or bloat. Your data stays in your browser.">
<meta property="og:title" content="MediTrack Simple - Medication Tracker">
<meta property="og:description" content="Track your medications without ads, accounts, or bloat. Free forever.">
<meta property="og:type" content="website">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<script>if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }</script>
<script src="https://cdn.tailwindcss.com"></script>

<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        brand: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a5f' }
      }
    }
  }
}
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  body { font-family: 'Inter', system-ui, sans-serif; }
  .fade-in { animation: fadeIn 0.2s ease-in; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .modal-overlay { animation: overlayIn 0.15s ease-out; }
  @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
  .check-pop { animation: checkPop 0.25s ease-out; }
  @keyframes checkPop { 0% { transform: scale(0.8); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

// ---- Data layer ----
const MEDS_KEY = 'meditrack-meds';
const LOG_KEY = 'meditrack-log';
const SETTINGS_KEY = 'meditrack-settings';

const FREQUENCIES = [
  { value: 'daily', label: 'Every day' },
  { value: 'twice', label: 'Twice daily' },
  { value: 'three', label: '3 times daily' },
  { value: 'weekly', label: 'Weekly' },
  { value: 'asneeded', label: 'As needed' },
];

const TIME_SLOTS = [
  { value: 'morning', label: 'Morning', icon: '\u2600\uFE0F' },
  { value: 'afternoon', label: 'Afternoon', icon: '\u26C5' },
  { value: 'evening', label: 'Evening', icon: '\uD83C\uDF05' },
  { value: 'bedtime', label: 'Bedtime', icon: '\uD83C\uDF19' },
];

const COLORS = ['#3b82f6','#ef4444','#22c55e','#a855f7','#f97316','#ec4899','#14b8a6','#eab308','#6366f1','#64748b'];

function load(key, fallback) {
  try { return JSON.parse(localStorage.getItem(key)) || fallback; }
  catch { return fallback; }
}
function save(key, data) { localStorage.setItem(key, JSON.stringify(data)); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function dateKey(d) { return d ? new Date(d).toISOString().slice(0, 10) : new Date().toISOString().slice(0, 10); }
function today() { return dateKey(new Date()); }
function formatDate(s) { const d = new Date(s + 'T12:00:00'); return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' }); }

function getDaysArray(n) {
  const arr = [];
  const d = new Date();
  for (let i = 0; i < n; i++) {
    arr.push(dateKey(d));
    d.setDate(d.getDate() - 1);
  }
  return arr;
}

function shouldTakeOnDay(med, dayStr) {
  if (med.frequency === 'asneeded') return false;
  if (med.frequency === 'weekly') {
    const start = new Date(med.startDate + 'T12:00:00');
    const day = new Date(dayStr + 'T12:00:00');
    const diff = Math.round((day - start) / 86400000);
    return diff >= 0 && diff % 7 === 0;
  }
  const start = new Date(med.startDate + 'T12:00:00');
  const day = new Date(dayStr + 'T12:00:00');
  return day >= start;
}

function dosesPerDay(freq) {
  if (freq === 'twice') return 2;
  if (freq === 'three') return 3;
  return 1;
}

function getTimeSlotsForMed(med) {
  if (med.frequency === 'twice') return med.timeSlots && med.timeSlots.length === 2 ? med.timeSlots : ['morning', 'evening'];
  if (med.frequency === 'three') return med.timeSlots && med.timeSlots.length === 3 ? med.timeSlots : ['morning', 'afternoon', 'evening'];
  if (med.frequency === 'asneeded') return [];
  return med.timeSlots && med.timeSlots.length >= 1 ? [med.timeSlots[0]] : ['morning'];
}

// ---- Modal ----
function Modal({ open, onClose, title, children }) {
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center modal-overlay" onClick={onClose}>
      <div className="absolute inset-0 bg-black/40" />
      <div className="relative bg-white dark:bg-gray-800 rounded-t-2xl sm:rounded-2xl w-full sm:max-w-md max-h-[85vh] overflow-y-auto p-6 shadow-2xl fade-in" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <h2 className="text-lg font-semibold text-gray-900 dark:text-white">{title}</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 text-xl leading-none">&times;</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ---- Add/Edit Med Form ----
function MedForm({ med, onSave, onCancel }) {
  const [name, setName] = useState(med ? med.name : '');
  const [dosage, setDosage] = useState(med ? med.dosage : '');
  const [frequency, setFrequency] = useState(med ? med.frequency : 'daily');
  const [timeSlots, setTimeSlots] = useState(med ? (med.timeSlots || ['morning']) : ['morning']);
  const [color, setColor] = useState(med ? med.color : COLORS[Math.floor(Math.random() * COLORS.length)]);
  const [notes, setNotes] = useState(med ? (med.notes || '') : '');
  const [startDate, setStartDate] = useState(med ? med.startDate : today());
  const [inventory, setInventory] = useState(med ? (med.inventory ?? '') : '');

  const effectiveSlotCount = frequency === 'twice' ? 2 : frequency === 'three' ? 3 : frequency === 'asneeded' ? 0 : 1;

  useEffect(() => {
    if (frequency === 'asneeded') { setTimeSlots([]); return; }
    const needed = frequency === 'twice' ? 2 : frequency === 'three' ? 3 : 1;
    const defaults = ['morning', 'afternoon', 'evening', 'bedtime'];
    if (timeSlots.length < needed) {
      const newSlots = [...timeSlots];
      for (const d of defaults) { if (newSlots.length >= needed) break; if (!newSlots.includes(d)) newSlots.push(d); }
      setTimeSlots(newSlots);
    } else if (timeSlots.length > needed) {
      setTimeSlots(timeSlots.slice(0, needed));
    }
  }, [frequency]);

  function toggleSlot(slot) {
    if (timeSlots.includes(slot)) {
      if (timeSlots.length > effectiveSlotCount) setTimeSlots(timeSlots.filter(s => s !== slot));
    } else {
      if (timeSlots.length < effectiveSlotCount) setTimeSlots([...timeSlots, slot]);
      else setTimeSlots([...timeSlots.slice(1), slot]);
    }
  }

  function handleSubmit(e) {
    e.preventDefault();
    if (!name.trim()) return;
    onSave({
      id: med ? med.id : genId(),
      name: name.trim(),
      dosage: dosage.trim(),
      frequency,
      timeSlots,
      color,
      notes: notes.trim(),
      startDate,
      inventory: inventory === '' ? null : parseInt(inventory, 10),
      active: med ? med.active : true,
    });
  }

  const inputCls = "w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white text-sm focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none";

  return (
    <form onSubmit={handleSubmit} className="space-y-4">
      <div>
        <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Medication name *</label>
        <input value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Lisinopril" className={inputCls} autoFocus required />
      </div>
      <div>
        <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Dosage</label>
        <input value={dosage} onChange={e => setDosage(e.target.value)} placeholder="e.g. 10mg" className={inputCls} />
      </div>
      <div>
        <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Frequency</label>
        <select value={frequency} onChange={e => setFrequency(e.target.value)} className={inputCls}>
          {FREQUENCIES.map(f => <option key={f.value} value={f.value}>{f.label}</option>)}
        </select>
      </div>
      {frequency !== 'asneeded' && (
        <div>
          <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
            Time{effectiveSlotCount > 1 ? 's' : ''} ({effectiveSlotCount} required)
          </label>
          <div className="flex gap-2 flex-wrap">
            {TIME_SLOTS.map(ts => (
              <button key={ts.value} type="button" onClick={() => toggleSlot(ts.value)}
                className={`px-3 py-1.5 rounded-full text-sm font-medium transition-colors ${
                  timeSlots.includes(ts.value)
                    ? 'bg-brand-500 text-white'
                    : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600'
                }`}>
                {ts.icon} {ts.label}
              </button>
            ))}
          </div>
        </div>
      )}
      <div>
        <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Start date</label>
        <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} className={inputCls} />
      </div>
      <div>
        <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Pills remaining (optional)</label>
        <input type="number" min="0" value={inventory} onChange={e => setInventory(e.target.value)} placeholder="Leave blank to skip" className={inputCls} />
      </div>
      <div>
        <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Color</label>
        <div className="flex gap-2 flex-wrap">
          {COLORS.map(c => (
            <button key={c} type="button" onClick={() => setColor(c)}
              className={`w-7 h-7 rounded-full border-2 transition-transform ${color === c ? 'border-gray-900 dark:border-white scale-110' : 'border-transparent'}`}
              style={{ backgroundColor: c }} />
          ))}
        </div>
      </div>
      <div>
        <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Notes</label>
        <input value={notes} onChange={e => setNotes(e.target.value)} placeholder="e.g. Take with food" className={inputCls} />
      </div>
      <div className="flex gap-3 pt-2">
        <button type="submit" className="flex-1 py-2 bg-brand-600 text-white rounded-lg font-medium hover:bg-brand-700 transition-colors">
          {med ? 'Update' : 'Add Medication'}
        </button>
        <button type="button" onClick={onCancel} className="px-4 py-2 border border-gray-300 dark:border-gray-600 text-gray-600 dark:text-gray-300 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
          Cancel
        </button>
      </div>
    </form>
  );
}

// ---- Today View ----
function TodayView({ meds, log, onToggle }) {
  const d = today();
  const scheduled = [];
  meds.filter(m => m.active).forEach(med => {
    if (!shouldTakeOnDay(med, d)) return;
    const slots = getTimeSlotsForMed(med);
    slots.forEach(slot => {
      const logKey = `${d}:${med.id}:${slot}`;
      scheduled.push({ med, slot, taken: !!log[logKey], logKey, takenAt: log[logKey] || null });
    });
  });

  const asNeeded = meds.filter(m => m.active && m.frequency === 'asneeded');

  const grouped = {};
  TIME_SLOTS.forEach(ts => { grouped[ts.value] = []; });
  scheduled.forEach(s => {
    if (grouped[s.slot]) grouped[s.slot].push(s);
  });

  const totalScheduled = scheduled.length;
  const totalTaken = scheduled.filter(s => s.taken).length;
  const pct = totalScheduled > 0 ? Math.round((totalTaken / totalScheduled) * 100) : 100;

  return (
    <div className="space-y-4">
      {/* Progress */}
      <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-100 dark:border-gray-700">
        <div className="flex items-center justify-between mb-2">
          <span className="text-sm font-medium text-gray-600 dark:text-gray-400">Today's Progress</span>
          <span className="text-sm font-semibold text-gray-900 dark:text-white">{totalTaken}/{totalScheduled}</span>
        </div>
        <div className="w-full h-3 bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden">
          <div className={`h-full rounded-full transition-all duration-500 ${pct === 100 ? 'bg-green-500' : pct >= 50 ? 'bg-brand-500' : 'bg-amber-500'}`}
            style={{ width: `${pct}%` }} />
        </div>
        {pct === 100 && totalScheduled > 0 && (
          <p className="text-sm text-green-600 dark:text-green-400 mt-2 font-medium">All done for today!</p>
        )}
      </div>

      {/* Scheduled meds by time slot */}
      {TIME_SLOTS.map(ts => {
        const items = grouped[ts.value];
        if (!items || items.length === 0) return null;
        return (
          <div key={ts.value} className="fade-in">
            <h3 className="text-sm font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-2">
              {ts.icon} {ts.label}
            </h3>
            <div className="space-y-2">
              {items.map(item => (
                <button key={item.logKey} onClick={() => onToggle(item.logKey, item.med)}
                  className={`w-full flex items-center gap-3 p-3 rounded-xl border transition-all ${
                    item.taken
                      ? 'bg-green-50 dark:bg-green-900/20 border-green-200 dark:border-green-800'
                      : 'bg-white dark:bg-gray-800 border-gray-100 dark:border-gray-700 hover:border-gray-300 dark:hover:border-gray-500'
                  }`}>
                  <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center flex-shrink-0 transition-colors ${
                    item.taken ? 'border-green-500 bg-green-500 check-pop' : 'border-gray-300 dark:border-gray-500'
                  }`}>
                    {item.taken && <svg className="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" /></svg>}
                  </div>
                  <div className="w-3 h-3 rounded-full flex-shrink-0" style={{ backgroundColor: item.med.color }} />
                  <div className="flex-1 text-left">
                    <span className={`text-sm font-medium ${item.taken ? 'text-green-700 dark:text-green-300 line-through' : 'text-gray-900 dark:text-white'}`}>
                      {item.med.name}
                    </span>
                    {item.med.dosage && (
                      <span className="text-xs text-gray-500 dark:text-gray-400 ml-2">{item.med.dosage}</span>
                    )}
                    {item.med.notes && (
                      <p className="text-xs text-gray-400 dark:text-gray-500 mt-0.5">{item.med.notes}</p>
                    )}
                  </div>
                  {item.taken && item.takenAt && (
                    <span className="text-xs text-green-600 dark:text-green-400">{item.takenAt}</span>
                  )}
                </button>
              ))}
            </div>
          </div>
        );
      })}

      {/* As needed meds */}
      {asNeeded.length > 0 && (
        <div className="fade-in">
          <h3 className="text-sm font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-2">
            As Needed
          </h3>
          <div className="space-y-2">
            {asNeeded.map(med => {
              const logKey = `${d}:${med.id}:asneeded`;
              const taken = !!log[logKey];
              return (
                <button key={med.id} onClick={() => onToggle(logKey, med)}
                  className={`w-full flex items-center gap-3 p-3 rounded-xl border transition-all ${
                    taken
                      ? 'bg-green-50 dark:bg-green-900/20 border-green-200 dark:border-green-800'
                      : 'bg-white dark:bg-gray-800 border-gray-100 dark:border-gray-700 hover:border-gray-300 dark:hover:border-gray-500'
                  }`}>
                  <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center flex-shrink-0 transition-colors ${
                    taken ? 'border-green-500 bg-green-500 check-pop' : 'border-gray-300 dark:border-gray-500'
                  }`}>
                    {taken && <svg className="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" /></svg>}
                  </div>
                  <div className="w-3 h-3 rounded-full flex-shrink-0" style={{ backgroundColor: med.color }} />
                  <div className="flex-1 text-left">
                    <span className={`text-sm font-medium ${taken ? 'text-green-700 dark:text-green-300' : 'text-gray-900 dark:text-white'}`}>
                      {med.name}
                    </span>
                    {med.dosage && <span className="text-xs text-gray-500 dark:text-gray-400 ml-2">{med.dosage}</span>}
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      )}

      {totalScheduled === 0 && asNeeded.length === 0 && (
        <div className="text-center py-12 text-gray-400 dark:text-gray-500">
          <p className="text-4xl mb-3">{'\uD83D\uDC8A'}</p>
          <p className="font-medium">No medications added yet</p>
          <p className="text-sm mt-1">Tap the + button to add your first medication</p>
        </div>
      )}
    </div>
  );
}

// ---- History View ----
function HistoryView({ meds, log }) {
  const [range, setRange] = useState(7);
  const days = getDaysArray(range);
  const activeMeds = meds.filter(m => m.active && m.frequency !== 'asneeded');

  function dayStats(dayStr) {
    let total = 0, taken = 0;
    activeMeds.forEach(med => {
      if (!shouldTakeOnDay(med, dayStr)) return;
      const slots = getTimeSlotsForMed(med);
      slots.forEach(slot => {
        total++;
        if (log[`${dayStr}:${med.id}:${slot}`]) taken++;
      });
    });
    return { total, taken, pct: total > 0 ? Math.round((taken / total) * 100) : -1 };
  }

  const stats = days.map(d => ({ date: d, ...dayStats(d) }));
  const validDays = stats.filter(s => s.pct >= 0);
  const avgAdherence = validDays.length > 0 ? Math.round(validDays.reduce((sum, s) => sum + s.pct, 0) / validDays.length) : 0;
  const perfectDays = validDays.filter(s => s.pct === 100).length;

  // Streak calculation
  let streak = 0;
  for (const s of stats) {
    if (s.pct === 100) streak++;
    else if (s.pct >= 0) break;
  }

  return (
    <div className="space-y-4">
      <div className="flex gap-2">
        {[7, 14, 30].map(n => (
          <button key={n} onClick={() => setRange(n)}
            className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-colors ${
              range === n ? 'bg-brand-500 text-white' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'
            }`}>
            {n}d
          </button>
        ))}
      </div>

      {/* Summary cards */}
      <div className="grid grid-cols-3 gap-3">
        <div className="bg-white dark:bg-gray-800 rounded-xl p-3 shadow-sm border border-gray-100 dark:border-gray-700 text-center">
          <p className="text-2xl font-bold text-brand-600 dark:text-brand-400">{avgAdherence}%</p>
          <p className="text-xs text-gray-500 dark:text-gray-400 mt-0.5">Adherence</p>
        </div>
        <div className="bg-white dark:bg-gray-800 rounded-xl p-3 shadow-sm border border-gray-100 dark:border-gray-700 text-center">
          <p className="text-2xl font-bold text-green-600 dark:text-green-400">{streak}</p>
          <p className="text-xs text-gray-500 dark:text-gray-400 mt-0.5">Day streak</p>
        </div>
        <div className="bg-white dark:bg-gray-800 rounded-xl p-3 shadow-sm border border-gray-100 dark:border-gray-700 text-center">
          <p className="text-2xl font-bold text-purple-600 dark:text-purple-400">{perfectDays}</p>
          <p className="text-xs text-gray-500 dark:text-gray-400 mt-0.5">Perfect days</p>
        </div>
      </div>

      {/* Day-by-day grid */}
      <div className="space-y-1.5">
        {stats.map(s => (
          <div key={s.date} className="flex items-center gap-3">
            <span className={`text-xs w-24 flex-shrink-0 ${s.date === today() ? 'font-semibold text-brand-600 dark:text-brand-400' : 'text-gray-500 dark:text-gray-400'}`}>
              {s.date === today() ? 'Today' : formatDate(s.date)}
            </span>
            {s.pct >= 0 ? (
              <>
                <div className="flex-1 h-5 bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden">
                  <div className={`h-full rounded-full transition-all ${s.pct === 100 ? 'bg-green-500' : s.pct >= 50 ? 'bg-brand-500' : s.pct > 0 ? 'bg-amber-500' : 'bg-red-400'}`}
                    style={{ width: `${Math.max(s.pct, 2)}%` }} />
                </div>
                <span className="text-xs font-medium text-gray-600 dark:text-gray-300 w-12 text-right">{s.taken}/{s.total}</span>
              </>
            ) : (
              <span className="text-xs text-gray-300 dark:text-gray-600 italic">No meds scheduled</span>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ---- Medications List ----
function MedsListView({ meds, log, onEdit, onToggleActive, onDelete }) {
  const active = meds.filter(m => m.active);
  const inactive = meds.filter(m => !m.active);

  function inventoryWarning(med) {
    if (med.inventory === null || med.inventory === undefined) return null;
    if (med.inventory <= 0) return { text: 'Out of stock', color: 'text-red-500' };
    if (med.inventory <= 7) return { text: `${med.inventory} left`, color: 'text-amber-500' };
    return { text: `${med.inventory} left`, color: 'text-gray-400 dark:text-gray-500' };
  }

  function renderMed(med) {
    const inv = inventoryWarning(med);
    const freq = FREQUENCIES.find(f => f.value === med.frequency);
    const slots = getTimeSlotsForMed(med);
    return (
      <div key={med.id} className={`bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-100 dark:border-gray-700 fade-in ${!med.active ? 'opacity-60' : ''}`}>
        <div className="flex items-start gap-3">
          <div className="w-4 h-4 rounded-full flex-shrink-0 mt-1" style={{ backgroundColor: med.color }} />
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-2">
              <h3 className="font-medium text-gray-900 dark:text-white truncate">{med.name}</h3>
              {med.dosage && <span className="text-sm text-gray-500 dark:text-gray-400">{med.dosage}</span>}
            </div>
            <div className="flex items-center gap-2 mt-1 flex-wrap">
              <span className="text-xs text-gray-500 dark:text-gray-400">{freq ? freq.label : med.frequency}</span>
              {slots.map(s => {
                const ts = TIME_SLOTS.find(t => t.value === s);
                return ts ? <span key={s} className="text-xs">{ts.icon}</span> : null;
              })}
              {inv && <span className={`text-xs font-medium ${inv.color}`}>{inv.text}</span>}
            </div>
            {med.notes && <p className="text-xs text-gray-400 dark:text-gray-500 mt-1">{med.notes}</p>}
          </div>
          <div className="flex gap-1 flex-shrink-0">
            <button onClick={() => onEdit(med)} className="p-1.5 text-gray-400 hover:text-brand-500 transition-colors" title="Edit">
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
            </button>
            <button onClick={() => onToggleActive(med.id)} className="p-1.5 text-gray-400 hover:text-amber-500 transition-colors" title={med.active ? 'Pause' : 'Resume'}>
              {med.active
                ? <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                : <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
              }
            </button>
            <button onClick={() => onDelete(med.id)} className="p-1.5 text-gray-400 hover:text-red-500 transition-colors" title="Delete">
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
            </button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="space-y-4">
      {active.length > 0 && (
        <div className="space-y-2">
          <h3 className="text-sm font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide">Active ({active.length})</h3>
          {active.map(renderMed)}
        </div>
      )}
      {inactive.length > 0 && (
        <div className="space-y-2">
          <h3 className="text-sm font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide">Paused ({inactive.length})</h3>
          {inactive.map(renderMed)}
        </div>
      )}
      {meds.length === 0 && (
        <div className="text-center py-12 text-gray-400 dark:text-gray-500">
          <p className="text-4xl mb-3">{'\uD83D\uDC8A'}</p>
          <p className="font-medium">No medications yet</p>
          <p className="text-sm mt-1">Add your medications to start tracking</p>
        </div>
      )}
    </div>
  );
}

// ---- PDF Report ----
function generatePDFReport(meds, log, rangeDays, patientName) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const pageW = doc.internal.pageSize.getWidth();
  const margin = 15;
  const contentW = pageW - margin * 2;
  let y = margin;

  function addPage() {
    doc.addPage();
    y = margin;
  }

  function checkSpace(needed) {
    if (y + needed > 270) addPage();
  }

  // Header
  doc.setFontSize(18);
  doc.setFont('helvetica', 'bold');
  doc.text('Medication Adherence Report', margin, y);
  y += 8;

  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');
  doc.setTextColor(100);
  if (patientName.trim()) {
    doc.text('Patient: ' + patientName.trim(), margin, y);
    y += 5;
  }
  const endDate = new Date();
  const startDate = new Date();
  startDate.setDate(startDate.getDate() - rangeDays + 1);
  doc.text('Period: ' + startDate.toLocaleDateString() + ' - ' + endDate.toLocaleDateString() + ' (' + rangeDays + ' days)', margin, y);
  y += 5;
  doc.text('Generated: ' + new Date().toLocaleString(), margin, y);
  y += 8;

  // Divider
  doc.setDrawColor(200);
  doc.line(margin, y, pageW - margin, y);
  y += 6;

  // Calculate overall stats
  const days = getDaysArray(rangeDays);
  const activeMeds = meds.filter(m => m.active && m.frequency !== 'asneeded');

  let totalAll = 0, takenAll = 0;
  const perMed = {};
  activeMeds.forEach(med => {
    perMed[med.id] = { total: 0, taken: 0, name: med.name, dosage: med.dosage || '', frequency: med.frequency };
  });

  const dayData = days.map(dayStr => {
    let dayTotal = 0, dayTaken = 0;
    activeMeds.forEach(med => {
      if (!shouldTakeOnDay(med, dayStr)) return;
      const slots = getTimeSlotsForMed(med);
      slots.forEach(slot => {
        dayTotal++;
        totalAll++;
        perMed[med.id].total++;
        if (log[dayStr + ':' + med.id + ':' + slot]) {
          dayTaken++;
          takenAll++;
          perMed[med.id].taken++;
        }
      });
    });
    return { date: dayStr, total: dayTotal, taken: dayTaken, pct: dayTotal > 0 ? Math.round((dayTaken / dayTotal) * 100) : -1 };
  });

  const validDays = dayData.filter(d => d.pct >= 0);
  const avgAdherence = validDays.length > 0 ? Math.round(validDays.reduce((sum, d) => sum + d.pct, 0) / validDays.length) : 0;
  const perfectDays = validDays.filter(d => d.pct === 100).length;
  let streak = 0;
  for (const d of dayData) {
    if (d.pct === 100) streak++;
    else if (d.pct >= 0) break;
  }

  // Summary section
  doc.setTextColor(0);
  doc.setFontSize(13);
  doc.setFont('helvetica', 'bold');
  doc.text('Summary', margin, y);
  y += 7;

  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');
  const summaryItems = [
    ['Overall Adherence', avgAdherence + '%'],
    ['Current Streak', streak + ' day' + (streak !== 1 ? 's' : '')],
    ['Perfect Days', perfectDays + ' of ' + validDays.length],
    ['Doses Taken', takenAll + ' of ' + totalAll + ' scheduled'],
  ];
  summaryItems.forEach(([label, value]) => {
    doc.setFont('helvetica', 'normal');
    doc.text(label + ':', margin, y);
    doc.setFont('helvetica', 'bold');
    doc.text(value, margin + 45, y);
    y += 5;
  });
  y += 4;

  // Per-medication breakdown
  checkSpace(20);
  doc.setFontSize(13);
  doc.setFont('helvetica', 'bold');
  doc.text('Medication Breakdown', margin, y);
  y += 7;

  doc.setFontSize(9);
  // Table header
  doc.setFont('helvetica', 'bold');
  doc.setFillColor(240, 240, 240);
  doc.rect(margin, y - 4, contentW, 6, 'F');
  doc.text('Medication', margin + 2, y);
  doc.text('Dosage', margin + 60, y);
  doc.text('Frequency', margin + 95, y);
  doc.text('Taken', margin + 130, y);
  doc.text('Adherence', margin + 152, y);
  y += 5;

  doc.setFont('helvetica', 'normal');
  Object.values(perMed).forEach(med => {
    checkSpace(6);
    const pct = med.total > 0 ? Math.round((med.taken / med.total) * 100) : 0;
    const freqLabel = FREQUENCIES.find(f => f.value === med.frequency);
    doc.text(med.name.substring(0, 30), margin + 2, y);
    doc.text(med.dosage.substring(0, 15), margin + 60, y);
    doc.text(freqLabel ? freqLabel.label : med.frequency, margin + 95, y);
    doc.text(med.taken + '/' + med.total, margin + 130, y);
    // Color code adherence
    if (pct >= 80) doc.setTextColor(34, 139, 34);
    else if (pct >= 50) doc.setTextColor(200, 150, 0);
    else doc.setTextColor(200, 50, 50);
    doc.text(pct + '%', margin + 152, y);
    doc.setTextColor(0);
    y += 5;
  });
  y += 4;

  // Daily log
  checkSpace(20);
  doc.setFontSize(13);
  doc.setFont('helvetica', 'bold');
  doc.text('Daily Log', margin, y);
  y += 7;

  doc.setFontSize(9);
  doc.setFont('helvetica', 'bold');
  doc.setFillColor(240, 240, 240);
  doc.rect(margin, y - 4, contentW, 6, 'F');
  doc.text('Date', margin + 2, y);
  doc.text('Taken', margin + 40, y);
  doc.text('Adherence', margin + 60, y);
  // Bar header area
  y += 5;

  doc.setFont('helvetica', 'normal');
  dayData.forEach(d => {
    if (d.pct < 0) return;
    checkSpace(5);
    const dateObj = new Date(d.date + 'T12:00:00');
    const dateStr = dateObj.toLocaleDateString(undefined, { month: 'short', day: 'numeric', weekday: 'short' });
    doc.text(dateStr, margin + 2, y);
    doc.text(d.taken + '/' + d.total, margin + 40, y);

    if (d.pct >= 80) doc.setTextColor(34, 139, 34);
    else if (d.pct >= 50) doc.setTextColor(200, 150, 0);
    else doc.setTextColor(200, 50, 50);
    doc.text(d.pct + '%', margin + 60, y);
    doc.setTextColor(0);

    // Mini bar
    const barX = margin + 80;
    const barW = contentW - 80;
    doc.setFillColor(230, 230, 230);
    doc.rect(barX, y - 3, barW, 3, 'F');
    if (d.pct > 0) {
      if (d.pct === 100) doc.setFillColor(34, 197, 94);
      else if (d.pct >= 50) doc.setFillColor(59, 130, 246);
      else doc.setFillColor(245, 158, 11);
      doc.rect(barX, y - 3, barW * (d.pct / 100), 3, 'F');
    }
    y += 5;
  });

  // Footer
  y += 6;
  checkSpace(10);
  doc.setDrawColor(200);
  doc.line(margin, y, pageW - margin, y);
  y += 5;
  doc.setFontSize(8);
  doc.setTextColor(150);
  doc.text('Generated by MediTrack Simple - meditrack.chrisgscott.me', margin, y);
  doc.text('This report is informational only. Consult your healthcare provider for medical decisions.', margin, y + 4);

  doc.save('meditrack-report-' + today() + '.pdf');
}

// ---- Settings View ----
function SettingsView({ meds, log, settings, onImport }) {
  function exportData() {
    const data = { meds, log, exportedAt: new Date().toISOString(), version: 1 };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `meditrack-backup-${today()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function handleImport(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.meds && data.log) {
          onImport(data);
        } else {
          alert('Invalid backup file format.');
        }
      } catch {
        alert('Could not parse backup file.');
      }
    };
    reader.readAsText(file);
  }

  function clearAll() {
    if (confirm('Delete all medications and history? This cannot be undone.')) {
      onImport({ meds: [], log: {} });
    }
  }

  return (
    <div className="space-y-4">
      <PDFReportPanel meds={meds} log={log} />
      <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-100 dark:border-gray-700 space-y-3">
        <h3 className="font-medium text-gray-900 dark:text-white">Data</h3>
        <button onClick={exportData}
          className="w-full py-2 px-4 bg-brand-50 dark:bg-brand-900/30 text-brand-600 dark:text-brand-400 rounded-lg text-sm font-medium hover:bg-brand-100 dark:hover:bg-brand-900/50 transition-colors">
          Export JSON Backup
        </button>
        <label className="block w-full py-2 px-4 bg-gray-50 dark:bg-gray-700 text-gray-600 dark:text-gray-300 rounded-lg text-sm font-medium text-center cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-600 transition-colors">
          Import Backup
          <input type="file" accept=".json" onChange={handleImport} className="hidden" />
        </label>
        <button onClick={clearAll}
          className="w-full py-2 px-4 bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 rounded-lg text-sm font-medium hover:bg-red-100 dark:hover:bg-red-900/40 transition-colors">
          Clear All Data
        </button>
      </div>
      <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-100 dark:border-gray-700">
        <h3 className="font-medium text-gray-900 dark:text-white mb-2">About</h3>
        <p className="text-sm text-gray-500 dark:text-gray-400">
          MediTrack Simple v1.1. No accounts, no ads, no tracking. Your data stays in your browser's localStorage. Export backups regularly.
        </p>
      </div>
    </div>
  );
}

// ---- App ----
function App() {
  const [meds, setMeds] = useState(() => load(MEDS_KEY, []));
  const [log, setLog] = useState(() => load(LOG_KEY, {}));
  const [settings, setSettings] = useState(() => load(SETTINGS_KEY, { dark: false }));
  const [tab, setTab] = useState('today');
  const [showForm, setShowForm] = useState(false);
  const [editMed, setEditMed] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);

  useEffect(() => { save(MEDS_KEY, meds); }, [meds]);
  useEffect(() => { save(LOG_KEY, log); }, [log]);
  useEffect(() => {
    save(SETTINGS_KEY, settings);
    if (settings.dark) document.documentElement.classList.add('dark');
    else document.documentElement.classList.remove('dark');
  }, [settings]);

  function toggleDark() { setSettings(s => ({ ...s, dark: !s.dark })); }

  function saveMed(med) {
    setMeds(prev => {
      const idx = prev.findIndex(m => m.id === med.id);
      if (idx >= 0) { const next = [...prev]; next[idx] = med; return next; }
      return [...prev, med];
    });
    setShowForm(false);
    setEditMed(null);
  }

  function toggleLog(logKey, med) {
    setLog(prev => {
      const next = { ...prev };
      if (next[logKey]) {
        delete next[logKey];
        // Restore inventory
        if (med.inventory !== null && med.inventory !== undefined) {
          setMeds(ms => ms.map(m => m.id === med.id ? { ...m, inventory: (m.inventory ?? 0) + 1 } : m));
        }
      } else {
        const now = new Date();
        next[logKey] = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        // Decrement inventory
        if (med.inventory !== null && med.inventory !== undefined) {
          setMeds(ms => ms.map(m => m.id === med.id ? { ...m, inventory: Math.max(0, (m.inventory ?? 1) - 1) } : m));
        }
      }
      return next;
    });
  }

  function toggleActive(id) {
    setMeds(prev => prev.map(m => m.id === id ? { ...m, active: !m.active } : m));
  }

  function deleteMed(id) {
    setMeds(prev => prev.filter(m => m.id !== id));
    // Clean up log entries for this med
    setLog(prev => {
      const next = {};
      Object.keys(prev).forEach(k => { if (!k.includes(`:${id}:`)) next[k] = prev[k]; });
      return next;
    });
    setConfirmDelete(null);
  }

  function handleImport(data) {
    setMeds(data.meds);
    setLog(data.log);
  }

  const tabs = [
    { id: 'today', label: 'Today', icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg> },

    { id: 'meds', label: 'Meds', icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" /></svg> },
    { id: 'settings', label: 'More', icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" /></svg> },
  ];

  return (
    <div className="min-h-screen bg-gray-50 dark:bg-gray-900 transition-colors">
      {/* Header */}
      <header className="sticky top-0 z-40 bg-white/80 dark:bg-gray-800/80 backdrop-blur-lg border-b border-gray-100 dark:border-gray-700">
        <div className="max-w-lg mx-auto px-4 py-3 flex items-center justify-between">
          <h1 className="text-lg font-bold text-gray-900 dark:text-white">{'\uD83D\uDC8A'} MediTrack</h1>
          <div className="flex items-center gap-2">

              {settings.dark
                ? <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                : <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
              }
            </button>
            <button onClick={() => { setEditMed(null); setShowForm(true); }}
              className="w-9 h-9 bg-brand-600 text-white rounded-full flex items-center justify-center hover:bg-brand-700 transition-colors shadow-sm">

      </main>

      {/* Bottom nav */}
      <nav className="fixed bottom-0 left-0 right-0 bg-white/80 dark:bg-gray-800/80 backdrop-blur-lg border-t border-gray-100 dark:border-gray-700 z-40">
        <div className="max-w-lg mx-auto flex">
          {tabs.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              className={`flex-1 py-2 pt-2.5 flex flex-col items-center gap-0.5 transition-colors ${
                tab === t.id ? 'text-brand-600 dark:text-brand-400' : 'text-gray-400 dark:text-gray-500'
              }`}>
              {t.icon}
              <span className="text-[10px] font-medium">{t.label}</span>
            </button>
          ))}
        </div>
      </nav>

      {/* Add/Edit Modal */}
      <Modal open={showForm} onClose={() => { setShowForm(false); setEditMed(null); }} title={editMed ? 'Edit Medication' : 'Add Medication'}>
        <MedForm med={editMed} onSave={saveMed} onCancel={() => { setShowForm(false); setEditMed(null); }} />
      </Modal>

      {/* Delete Confirmation */}
      <Modal open={!!confirmDelete} onClose={() => setConfirmDelete(null)} title="Delete Medication">
        <p className="text-sm text-gray-600 dark:text-gray-300 mb-4">This will permanently delete this medication and all its history. Are you sure?</p>
        <div className="flex gap-3">
          <button onClick={() => deleteMed(confirmDelete)} className="flex-1 py-2 bg-red-600 text-white rounded-lg font-medium hover:bg-red-700 transition-colors">Delete</button>
          <button onClick={() => setConfirmDelete(null)} className="flex-1 py-2 border border-gray-300 dark:border-gray-600 text-gray-600 dark:text-gray-300 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">Cancel</button>
        </div>
      </Modal>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
